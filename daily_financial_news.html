<style>
  :root {
    --bg: #0e0d0a; --panel: #15130f; --panel-2: #1c1a14;
    --ink: #efe7d6; --ink-dim: #a39681; --rule: #2a2620;
    --amber: #e8a838; --amber-bright: #ffc857;
    --green: #6db674; --red: #d96c5c; --accent: #c9b07a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; line-height: 1.55; }
  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(232,168,56,0.06), transparent 40%),
      radial-gradient(ellipse at bottom right, rgba(201,176,122,0.04), transparent 50%);
    min-height: 100vh; padding: 40px 24px 80px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }
  .mast { border-top: 3px double var(--ink); border-bottom: 1px solid var(--rule); padding: 18px 0 14px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 24px; }
  .mast-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); }
  .mast-meta.right { text-align: right; }
  .mast h1 { font-family: 'Fraunces', serif; font-weight: 800; font-size: clamp(34px, 5vw, 52px); letter-spacing: -0.02em; text-align: center; line-height: 1; }
  .mast h1 em { font-style: italic; color: var(--amber); font-weight: 400; }
  .subhead { text-align: center; margin-top: 14px; padding-bottom: 28px; border-bottom: 1px solid var(--rule); font-family: 'Fraunces', serif; font-style: italic; color: var(--ink-dim); font-size: 15px; }
  section { margin-top: 44px; }
  .sec-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.25em; color: var(--amber); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .sec-label::before { content: ''; width: 24px; height: 1px; background: var(--amber); }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .sec-title { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 22px; }
  .tape { background: var(--panel); border: 1px solid var(--rule); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  .tape th, .tape td { padding: 12px 16px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 13px; border-bottom: 1px solid var(--rule); }
  .tape th { background: var(--panel-2); color: var(--ink-dim); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; text-align: right; }
  .tape th:first-child, .tape td:first-child { text-align: left; }
  .tape tr:last-child td { border-bottom: none; }
  .tape .name { font-family: 'Fraunces', serif; font-size: 15px; color: var(--ink); font-weight: 600; letter-spacing: 0; }
  .tape .ticker { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); margin-left: 8px; }
  .up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--ink-dim); }
  .lede { display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px; margin-top: 16px; }
  .lede-main { border-left: 3px solid var(--amber); padding-left: 24px; }
  .kicker { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber-bright); margin-bottom: 10px; }
  .lede h2 { font-family: 'Fraunces', serif; font-weight: 800; font-size: 36px; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 14px; }
  .lede h2 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .lede p { color: var(--ink); font-size: 16px; margin-bottom: 12px; }
  .lede p:last-child { color: var(--ink-dim); font-size: 14px; }
  .lede-side { display: flex; flex-direction: column; gap: 18px; }
  .side-card { background: var(--panel); border: 1px solid var(--rule); padding: 18px; }
  .side-card .num { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; margin-bottom: 6px; }
  .side-card .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 10px; }
  .side-card p { font-size: 13px; color: var(--ink-dim); line-height: 1.5; }
  .side-card.amber .num { color: var(--amber-bright); }
  .side-card.green .num { color: var(--green); }
  .side-card.red .num { color: var(--red); }
  .stories { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; border-top: 1px solid var(--rule); }
  .story { padding: 24px 28px 24px 0; border-bottom: 1px solid var(--rule); }
  .story:nth-child(odd) { border-right: 1px solid var(--rule); padding-right: 28px; }
  .story:nth-child(even) { padding-left: 28px; padding-right: 0; }
  .story .tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--bg); background: var(--amber); padding: 3px 8px; margin-bottom: 12px; }
  .story .tag.macro { background: var(--accent); }
  .story .tag.geo { background: var(--red); color: var(--ink); }
  .story .tag.corp { background: var(--green); color: var(--bg); }
  .story .tag.fed { background: var(--amber-bright); }
  .story .tag.crypto { background: #f0a040; color: var(--bg); }
  .story h3 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px; line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 10px; }
  .story p { font-size: 14px; color: var(--ink-dim); }
  .story .pull { font-family: 'Fraunces', serif; font-style: italic; font-size: 15px; color: var(--accent); border-top: 1px solid var(--rule); margin-top: 12px; padding-top: 10px; }
  .renesas-wrap { background: linear-gradient(135deg, var(--panel) 0%, rgba(40,30,15,0.6) 100%); border: 1px solid var(--rule); border-left: 4px solid #d96c5c; padding: 28px 32px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 32px; align-items: start; }
  .renesas-head { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #d96c5c; margin-bottom: 8px; }
  .renesas-wrap h3 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 26px; line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 14px; }
  .renesas-wrap h3 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .renesas-wrap p { font-size: 14.5px; color: var(--ink); margin-bottom: 10px; }
  .renesas-wrap p:last-of-type { color: var(--ink-dim); font-size: 13.5px; }
  .renesas-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .rstat { background: rgba(0,0,0,0.25); border: 1px solid var(--rule); padding: 12px 14px; }
  .rstat .rk { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 6px; }
  .rstat .rv { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; line-height: 1; margin-bottom: 4px; }
  .rstat .rv.up { color: var(--green); }
  .rstat .rv.down { color: var(--red); }
  .rstat .rv.amber { color: var(--amber-bright); }
  .rstat small { font-size: 11px; color: var(--ink-dim); font-family: 'Inter', sans-serif; }
  .crypto-wrap { display: grid; grid-template-columns: 1.1fr 1fr; gap: 28px; align-items: start; }
  .crypto-tape { background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%); border: 1px solid var(--rule); position: relative; overflow: hidden; }
  .crypto-tape::before { content: '24/7'; position: absolute; top: 12px; right: 16px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.2em; color: var(--amber); background: rgba(232,168,56,0.1); padding: 3px 8px; border: 1px solid rgba(232,168,56,0.3); }
  .crypto-tape h4 { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: var(--ink-dim); padding: 14px 20px 10px; border-bottom: 1px solid var(--rule); font-weight: 400; }
  .crypto-row { display: grid; grid-template-columns: 56px 1fr auto auto; gap: 14px; padding: 12px 20px; align-items: baseline; border-bottom: 1px solid var(--rule); }
  .crypto-row:last-child { border-bottom: none; }
  .crypto-sym { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--amber); font-weight: 700; }
  .crypto-name { font-family: 'Fraunces', serif; font-size: 14px; color: var(--ink); }
  .crypto-name span { display: block; font-family: 'Inter', sans-serif; font-size: 11px; color: var(--ink-dim); margin-top: 2px; }
  .crypto-price { font-family: 'JetBrains Mono', monospace; font-size: 14px; text-align: right; color: var(--ink); }
  .crypto-chg { font-family: 'JetBrains Mono', monospace; font-size: 12px; text-align: right; min-width: 64px; }
  .crypto-notes { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .cnote { background: var(--panel); border: 1px solid var(--rule); border-left: 3px solid #f0a040; padding: 14px 18px; }
  .cnote .ckicker { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: #f0a040; margin-bottom: 6px; }
  .cnote h4 { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; margin-bottom: 6px; line-height: 1.2; }
  .cnote p { font-size: 13px; color: var(--ink-dim); line-height: 1.5; }
  .earnings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .ern { background: var(--panel); border: 1px solid var(--rule); padding: 16px 18px; position: relative; }
  .ern.win { border-left: 3px solid var(--green); }
  .ern.loss { border-left: 3px solid var(--red); }
  .ern.mix { border-left: 3px solid var(--amber); }
  .ern .co { font-family: 'Fraunces', serif; font-weight: 700; font-size: 17px; margin-bottom: 2px; }
  .ern .move { font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-bottom: 8px; }
  .ern p { font-size: 13px; color: var(--ink-dim); line-height: 1.45; }
  .ahead { background: var(--panel); border: 1px solid var(--rule); }
  .ahead-row { display: grid; grid-template-columns: 110px 1fr 200px; gap: 24px; padding: 16px 24px; border-bottom: 1px solid var(--rule); align-items: baseline; }
  .ahead-row:last-child { border-bottom: none; }
  .ahead-day { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--amber); }
  .ahead-event { font-family: 'Fraunces', serif; font-size: 16px; }
  .ahead-event strong { font-weight: 600; }
  .ahead-tickers { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); text-align: right; letter-spacing: 0.05em; }
  footer { margin-top: 60px; padding-top: 24px; border-top: 3px double var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-dim); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  @media (max-width: 820px) {
    .lede, .stories, .earnings-grid { grid-template-columns: 1fr; }
    .crypto-wrap { grid-template-columns: 1fr; }
    .renesas-wrap { grid-template-columns: 1fr; padding: 22px; }
    .ahead-row { grid-template-columns: 90px 1fr; }
    .ahead-tickers { grid-column: 1 / -1; text-align: left; padding-left: 114px; }
    .mast { grid-template-columns: 1fr; text-align: center; }
    .mast-meta.right { text-align: center; }
    .tape { overflow-x: auto; }
  }
</style>
</head>

<script>
(function() {
  const D = JSON.parse(document.getElementById('dashboard-data').textContent);
  const $ = id => document.getElementById(id);
  const set = (id, html) => { const e = $(id); if (e) e.innerHTML = html; };
  const txt = (id, t) => { const e = $(id); if (e) e.textContent = t; };

  txt('mast-vol', D.masthead.volume);
  txt('mast-date', D.masthead.date);
  txt('subhead', D.masthead.subhead);

  txt('tape-label', D.tape.label);
  set('tape-body', D.tape.rows.map(r => `
    <tr>
      <td><span class="name">${r.name}</span><span class="ticker">${r.ticker}</span></td>
      <td>${r.last}</td>
      <td class="${r.dir}">${r.delta}</td>
      <td class="${r.dir}">${r.pct}</td>
      <td>${r.note}</td>
    </tr>`).join(''));

  set('lede-kicker', D.lede.kicker);
  set('lede-headline', D.lede.headline);
  set('lede-paragraphs', D.lede.paragraphs.map(p => `<p>${p}</p>`).join(''));
  set('lede-cards', D.lede.cards.map(c => `
    <div class="side-card ${c.tone}">
      <div class="label">${c.label}</div>
      <div class="num">${c.num}</div>
      <p>${c.body}</p>
    </div>`).join(''));

  set('stories', D.stories.map(s => `
    <article class="story">
      <span class="tag ${s.tone}">${s.tag}</span>
      <h3>${s.title}</h3>
      <p>${s.body}</p>
      ${s.pull ? `<div class="pull">${s.pull}</div>` : ''}
    </article>`).join(''));

  txt('renesas-label', D.renesas.label);
  txt('renesas-title', D.renesas.title);
  txt('renesas-head', D.renesas.head);
  set('renesas-headline', D.renesas.headline);
  set('renesas-paragraphs', D.renesas.paragraphs.map(p => `<p>${p}</p>`).join(''));
  set('renesas-stats', D.renesas.stats.map(s => `
    <div class="rstat">
      <div class="rk">${s.key}</div>
      <div class="rv ${s.tone || ''}">${s.value}</div>
      <small>${s.small}</small>
    </div>`).join(''));

  txt('crypto-tape-header', D.crypto.tapeHeader);
  set('crypto-tape-rows', D.crypto.tape.map(r => `
    <div class="crypto-row">
      <div class="crypto-sym">${r.sym}</div>
      <div class="crypto-name">${r.name} <span>${r.sub}</span></div>
      <div class="crypto-price">${r.price}</div>
      <div class="crypto-chg ${r.dir}">${r.chg}</div>
    </div>`).join(''));
  set('crypto-notes', D.crypto.notes.map(n => `
    <div class="cnote">
      <div class="ckicker">${n.kicker}</div>
      <h4>${n.title}</h4>
      <p>${n.body}</p>
    </div>`).join(''));

  txt('earnings-label', D.earnings.label);
  set('earnings-grid', D.earnings.tiles.map(t => `
    <div class="ern ${t.tone}">
      <div class="co">${t.co}</div>
      <div class="move ${t.moveDir || 'flat'}">${t.move}</div>
      <p>${t.body}</p>
    </div>`).join(''));

  set('week-ahead', D.weekAhead.rows.map(r => `
    <div class="ahead-row">
      <div class="ahead-day">${r.day}</div>
      <div class="ahead-event">${r.event}</div>
      <div class="ahead-tickers">${r.tickers}</div>
    </div>`).join(''));

  txt('footer-compiled', D.footer.compiled);
  txt('footer-disclaimer', D.footer.disclaimer);
})();
</script>
