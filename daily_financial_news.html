<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Daily Tape</title>
  <style>
    :root {
      --paper: #f7f8fa;
      --ink: #111317;
      --muted: #626a75;
      --line: #d9dee7;
      --panel: #ffffff;
      --panel-soft: #eef4f6;
      --blue: #2457ff;
      --teal: #0f9f8f;
      --red: #d64f45;
      --green: #18885b;
      --gold: #b8860b;
      --violet: #7357d6;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.06);
      --card-padding: 18px;
      --card-radius: 8px;
      --card-body-line: 1.4;
      --label-size: 10px;
      --label-weight: 900;
      --label-spacing: 0.14em;
    }
    * { box-sizing: border-box; }
    html { background: var(--paper); color: var(--ink); }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      background: var(--paper);
    }
    a { color: inherit; }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 26px 22px 60px;
    }
    .topline {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      align-items: center;
      border-top: 5px solid var(--ink);
      border-bottom: 1px solid var(--line);
      padding: 16px 0;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .topline .right { text-align: right; }
    .brand {
      text-align: center;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 6vw, 76px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: none;
    }
    .brand span {
      color: var(--blue);
      font-style: italic;
      font-weight: 500;
    }
    .opening-board {
      padding: 22px 0 0;
    }
    .opening-main { min-width: 0; }
    .opening-main h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 0;
    }
    .opening-deck {
      margin: 12px 0 0;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.45;
    }
    .catalyst-strip {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--panel);
      overflow: hidden;
    }
    .catalyst-chip {
      padding: var(--card-padding);
      border-right: 1px solid var(--line);
    }
    .catalyst-chip:last-child { border-right: none; }
    .catalyst-chip .label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
    }
    .catalyst-chip p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: var(--card-body-line);
    }
    .up, .green { color: var(--green); }
    .down, .red, .loss { color: var(--red); }
    .flat, .mix { color: var(--muted); }
    .amber, .fed { color: var(--gold); }
    .surface {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
    }
    .surface-shadow { box-shadow: var(--shadow); }
    .surface-clip { overflow: hidden; }
    .card {
      padding: var(--card-padding);
      display: grid;
      align-content: start;
      gap: 10px;
    }
    .card-tall { min-height: 190px; }
    .entity-name {
      min-width: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      font-size: 15px;
      font-weight: 850;
      line-height: 1.12;
      letter-spacing: 0;
    }
    .entity-name-lg {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.1;
    }
    .entity-sub {
      display: block;
      color: var(--muted);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 10.5px;
      font-weight: 650;
      line-height: 1.25;
      margin-top: 2px;
    }
    .entity-sub-mono {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
    }
    .metric-primary {
      color: var(--ink);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
    }
    .section { margin-top: 34px; }
    .section-pre-market,
    .section-crypto,
    .section-week-ahead { margin-top: 28px; }
    .section-portfolio { margin-top: 40px; }
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }
    .section-label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .section-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1;
      letter-spacing: 0;
    }
    .section-note {
      color: var(--muted);
      font-size: 13px;
      max-width: 460px;
      text-align: right;
    }
    .section-context {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .table-card { overflow: hidden; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      background: #eef1f6;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    td {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      font-size: 14px;
    }
    tr:last-child td { border-bottom: none; }
    td.num, th.num {
      text-align: right;
      font-family: "SFMono-Regular", Consolas, monospace;
      white-space: nowrap;
    }
    .instrument { display: grid; gap: 2px; }
    .tape-group {
      border-bottom: 1px solid var(--line);
    }
    .tape-group:last-child { border-bottom: none; }
    .tape-group-label {
      padding: 8px 14px;
      background: #f8fafc;
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
    }
    .tape-row {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr) 290px;
      gap: 20px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
    }
    .tape-row:last-child { border-bottom: none; }
    .tape-row.up { border-left: 3px solid var(--green); }
    .tape-row.down { border-left: 3px solid var(--red); }
    .tape-row.flat,
    .tape-row.mix { border-left: 3px solid transparent; }
    .tape-signal {
      color: var(--ink);
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      font-size: 13px;
      line-height: 1.35;
    }
    .quote-cluster {
      display: grid;
      grid-template-columns: minmax(96px, 1fr) 136px;
      gap: 22px;
      align-items: baseline;
      justify-items: end;
      font-family: "SFMono-Regular", Consolas, monospace;
      white-space: nowrap;
    }
    .quote-last { text-align: right; }
    .metric-pair {
      display: inline-flex;
      justify-content: flex-end;
      gap: 6px;
      width: 100%;
      white-space: nowrap;
    }
    .metric-value,
    .metric-sep {
      font-size: 13px;
      font-weight: 850;
    }
    .metric-sep { color: var(--muted); }
    .metric-value.up { color: var(--green); }
    .metric-value.down { color: var(--red); }
    .metric-value.flat,
    .metric-value.mix { color: var(--muted); }
    .portfolio-section { padding: 18px; }
    .portfolio-section .section-head {
      margin-bottom: 12px;
      border-bottom-color: var(--line);
    }
    .portfolio-section .section-note { text-align: left; }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
    }
    .portfolio-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      min-height: 88px;
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--panel);
    }
    .portfolio-card-main {
      min-width: 0;
    }
    .portfolio-card-title {
      font-size: 14px;
      font-weight: 850;
      line-height: 1.15;
    }
    .portfolio-card-ticker {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      color: #1f2937;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.02em;
    }
    .portfolio-card-metrics {
      display: grid;
      gap: 8px;
      justify-items: end;
      text-align: right;
      white-space: nowrap;
    }
    .portfolio-card-return {
      justify-content: end;
      width: auto;
    }
    .portfolio-card-return .metric-value,
    .portfolio-card-return .metric-sep {
      font-size: 17px;
    }
    .portfolio-card-price {
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.05;
    }
    .portfolio-source-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f5f7fa;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 7px;
      white-space: nowrap;
    }
    .asset {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--ink);
    }
    .asset strong { color: var(--ink); }
    .dividend-cell {
      color: var(--muted);
      font-weight: 650;
      line-height: 1.25;
    }
    .dividend-value {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      width: 100%;
    }
    .div-info {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--muted);
      background: #f8fafc;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      cursor: help;
      outline: none;
    }
    .div-info::after {
      content: attr(data-tooltip);
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      z-index: 5;
      width: max-content;
      max-width: 220px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--ink);
      color: var(--panel);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 11px;
      font-weight: 750;
      line-height: 1.25;
      text-align: left;
      white-space: normal;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(3px);
      transition: opacity 120ms ease, transform 120ms ease;
    }
    .div-info:hover::after,
    .div-info:focus-visible::after {
      opacity: 1;
      transform: translateY(0);
    }
    .swatch {
      width: 12px;
      height: 28px;
      border-radius: 3px;
      background: #2563eb;
      font-size: 0;
      line-height: 0;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .swatch.vti { background: #2563eb; }
    .swatch.vea { background: #16a34a; }
    .swatch.vwo { background: #db2777; }
    .swatch.vnq { background: #7c3aed; }
    .swatch.dbc { background: #7c2d12; }
    .swatch.gld { background: #ca8a04; }
    .swatch.ief { background: #0891b2; }
    .swatch.boxx { background: #475569; }
    .story-grid,
    .earnings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .crypto-grid {
      align-items: start;
      grid-template-columns: minmax(0, 1fr) minmax(0, 2fr);
    }
    .crypto-left {
      display: grid;
      gap: 14px;
      align-items: start;
    }
    .crypto-notes {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
    }
    .story,
    .earn,
    .crypto-note {
      min-height: 190px;
    }
    .tag {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
    }
    .tag.geo,
    .tag.loss,
    .tag.corp,
    .tag.win,
    .tag.fed,
    .tag.macro,
    .tag.crypto { color: var(--blue); }
    .story h3,
    .earn h3,
    .crypto-note h3 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .story p,
    .earn p,
    .crypto-note p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: var(--card-body-line);
    }
    .story-link {
      align-self: end;
      justify-self: start;
      color: var(--blue);
      border-bottom: 1px solid currentColor;
      text-decoration: none;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .crypto-tape { min-height: 190px; }
    .crypto-grid .crypto-tape { grid-column: 1; }
    .crypto-tape h3 {
      margin: 0;
      padding: 14px 18px;
      background: #eef1f6;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .crypto-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(218px, 230px);
      gap: 16px;
      align-items: baseline;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
    }
    .crypto-row .name {
      display: block;
    }
    .crypto-row .name span {
      display: block;
    }
    .crypto-quote {
      display: grid;
      grid-template-columns: minmax(76px, 1fr) 126px;
      gap: 14px;
      align-items: baseline;
      justify-items: end;
      font-family: "SFMono-Regular", Consolas, monospace;
      white-space: nowrap;
    }
    .crypto-row .price { text-align: right; }
    .crypto-stat { min-height: 90px; }
    .crypto-stat-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }
    .crypto-stat-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .crypto-stat h3 {
      margin: 0;
    }
    .crypto-stat p {
      margin: 0;
    }
    .crypto-stat-values {
      display: grid;
      gap: 4px;
      justify-items: end;
      font-family: "SFMono-Regular", Consolas, monospace;
      white-space: nowrap;
    }
    .crypto-stat-values strong { text-align: right; }
    .week { overflow: hidden; }
    .premarket {
      display: grid;
      grid-template-columns: minmax(0, 0.82fr) minmax(0, 1.18fr);
      gap: 16px;
      align-items: stretch;
    }
    .premarket-board,
    .premarket-news {
      overflow: hidden;
    }
    .premarket-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
    }
    .premarket-news {
      display: grid;
      grid-auto-rows: minmax(0, 1fr);
    }
    .future-card {
      min-height: 166px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: var(--card-padding);
      display: grid;
      grid-template-rows: auto auto auto minmax(78px, 1fr);
      align-content: stretch;
      min-width: 0;
    }
    .future-card:nth-child(2n) { border-right: none; }
    .future-card:nth-last-child(-n + 2) { border-bottom: none; }
    .future-card .label,
    .premarket-item .label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .future-card .value {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }
    .future-card p,
    .premarket-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: var(--card-body-line);
    }
    .future-chart {
      min-height: 78px;
      height: 100%;
      margin-top: 14px;
      align-self: stretch;
      overflow: hidden;
    }
    .future-spark {
      width: 100%;
      height: 100%;
      color: var(--muted);
      display: block;
      overflow: hidden;
    }
    .future-spark.up { color: var(--green); }
    .future-spark.down { color: var(--red); }
    .future-spark .spark-grid {
      stroke: var(--line);
      stroke-width: 1;
    }
    .future-spark .spark-line {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .future-spark .spark-area {
      fill: currentColor;
      opacity: 0.08;
    }
    .premarket-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 14px;
      padding: var(--card-padding);
      border-bottom: 1px solid var(--line);
      align-content: start;
      min-height: 0;
    }
    .premarket-item:last-child { border-bottom: none; }
    .premarket-item h3 {
      margin: 0 0 5px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 19px;
      line-height: 1.13;
      letter-spacing: 0;
    }
    .week-row {
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr) 220px;
      gap: 18px;
      align-items: start;
      padding: var(--card-padding);
      border-bottom: 1px solid var(--line);
    }
    .week-row:last-child { border-bottom: none; }
    .week-day {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
    }
    .week-event { font-size: 14px; }
    .week-tickers {
      color: var(--muted);
      text-align: right;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
    }
    .error {
      margin-top: 20px;
      border: 1px solid rgba(214,79,69,0.45);
      border-left: 5px solid var(--red);
      background: #fff5f4;
      border-radius: 8px;
      padding: 14px;
      color: var(--ink);
    }
    footer {
      display: grid;
      gap: 10px;
      color: var(--muted);
      border-top: 5px solid var(--ink);
      margin-top: 42px;
      padding-top: 16px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    @media (max-width: 1050px) {
      .premarket {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-self: stretch;
      }
      .catalyst-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .catalyst-chip:nth-child(2n) { border-right: none; }
      .catalyst-chip:nth-child(-n + 2) { border-bottom: 1px solid var(--line); }
      .story-grid,
      .earnings-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .crypto-grid,
      .crypto-notes { grid-template-columns: 1fr; }
      .crypto-grid .crypto-tape { grid-column: auto; }
    }
    @media (max-width: 760px) {
      .page { padding: 18px 14px 44px; }
      .topline { grid-template-columns: 1fr; text-align: center; }
      .topline .right { text-align: center; }
      .catalyst-strip { grid-template-columns: 1fr; }
      .catalyst-chip,
      .catalyst-chip:nth-child(2n) {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
      .catalyst-chip:last-child { border-bottom: none; }
      .section-head { align-items: start; flex-direction: column; }
      .section-note { text-align: left; }
      .story-grid,

    <footer id="footer"></footer>
  </div>

  <script>
    (function () {
      const ETF_UNIVERSE = [
        ['VTI', 'U.S. total market equity', 'vti'],
        ['VEA', 'Developed ex-U.S. equity', 'vea'],
        ['VWO', 'Emerging markets equity', 'vwo'],
        ['VNQ', 'U.S. real estate', 'vnq'],
        ['DBC', 'Broad commodities', 'dbc'],
        ['GLD', 'Gold', 'gld'],
        ['IEF', '7-10Y U.S. Treasuries', 'ief'],
        ['BOXX', 'Cash / T-bill alternative', 'boxx']
      ];
      const PORTFOLIO_ASSET_TITLES = {
        VTI: 'U.S. Total Market Equity',
        VEA: 'Developed ex-U.S. Equity',
        VWO: 'Emerging Markets Equity',
        VNQ: 'U.S. Real Estate',
        DBC: 'Broad Commodities',
        GLD: 'Gold',
        IEF: '7-10Y U.S. Treasuries',
        BOXX: 'Cash / T-Bill Alternative'
      };
      const $ = (id) => document.getElementById(id);
      const asArr = (v) => Array.isArray(v) ? v : [];
      const asObj = (v) => v && typeof v === 'object' ? v : {};
      const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
      const inline = (v) => esc(v).replace(/&lt;(\/?)(strong|em)&gt;/g, '<$1$2>');
      const sentenceCase = (value) => String(value ?? '').replace(/^(\s*)([a-z])/, (_match, lead, first) => `${lead}${first.toUpperCase()}`);
      const safeUrl = (value) => {
        const raw = String(value ?? '').trim();
        if (!raw) return '';
        try {
          const url = new URL(raw, window.location.href);
          return url.protocol === 'https:' ? url.href : '';
        } catch (_error) {
          return '';
        }
      };
      const tone = (value) => {
        const raw = String(value ?? '').trim();
        return ['up', 'down', 'flat', 'amber', 'green', 'red', 'macro', 'geo', 'corp', 'fed', 'crypto', 'win', 'loss', 'mix'].includes(raw) ? raw : 'flat';
      };
      // Presentation grouping only; all daily market values still come from embedded tape.rows JSON.
      const TAPE_GROUPS = [
        { label: 'Domestic Equities', tickers: ['SPX', 'IXIC', 'DJI', 'RUT'] },
        { label: 'International Equities', tickers: ['MXEA', 'MXEF'] },
        { label: 'Real Estate', tickers: ['FNER'] },
        { label: 'Commodities', tickers: ['GSCI', 'XAU', 'XAG', 'CL'] },
        { label: 'Rates / Vol', tickers: ['VIX', 'MOVE', 'UST10Y', 'UST30Y'], invertTone: true },
        { label: 'Bonds', tickers: ['IEF', 'AGG', 'LQD', 'HYG'] }
      ];
      function tapeTone(row, group) {
        const value = tone(row?.dir);
        if (!group?.invertTone) return value;
        if (value === 'up') return 'down';
        if (value === 'down') return 'up';
        return value;
      }

      function mondaySetup(data) {
        const subhead = String(data.opening?.deck || '');
        const parts = subhead.split(/ · Monday setup:\s*/i);
        if (parts.length > 1) return sentenceCase(parts.pop());
        const match = subhead.match(/Monday setup:\s*(.*)$/i);
        if (match) return sentenceCase(match[1]);
        return sentenceCase(data.opening?.headline || 'The setup is still developing.');
      }

      function openingCatalysts(data) {
        const setup = mondaySetup(data);
        const catalysts = [
          {
            label: 'Geopolitics',
            body: /iran|gulf|truce/i.test(setup)
              ? 'Gulf truce headlines are still setting the overnight risk tone.'
              : 'Overnight headlines are setting the first risk check.'
          },
          {
            label: 'Positioning',
            body: /quarter.end|rotation/i.test(setup)
              ? 'Quarter-end rotation is keeping leadership fragile.'
              : 'Positioning is shaping the first move before cash trading.'
          },
          {
            label: 'Calendar',
            body: /jobs/i.test(setup)
              ? 'Jobs week is the next macro test for yields and risk appetite.'
              : 'The calendar is the next test for yields and risk appetite.'
          },
          {
            label: 'Leadership',
            body: /AI|tech|software/i.test(setup)
              ? 'AI fatigue is still weighing on tech leadership.'
              : 'Leadership quality remains the key tell inside the tape.'
          }
        ];
        return catalysts;
      }

      function cryptoTapeRows(data) {
        const rows = [...asArr(data.crypto?.tape)];
        const hasTotal = rows.some((row) => row.sym === 'TOTAL' || /(?:total )?crypto market cap/i.test(row.name || ''));
        const totalRow = asArr(data.tape?.rows).find((row) => row.ticker === 'TOTAL');
        if (!hasTotal && totalRow) {
          rows.push({
            sym: 'TOTAL',
            name: 'Crypto Market Cap',
            sub: 'Total Market Cap',
            price: totalRow.last,
            delta: totalRow.delta,
            chg: totalRow.pct,
            dir: totalRow.dir
          });
        }
        return rows.filter((row) => !isCryptoStatRow(row));
      }

      function isCryptoSentimentRow(row) {
        return row?.sym === 'F&G' || /fear\s*&?\s*greed/i.test(row?.name || '');
      }

      function isCryptoTotalRow(row) {
        return row?.sym === 'TOTAL' || row?.ticker === 'TOTAL' || /(?:total )?crypto market cap/i.test(row?.name || '');
      }

      function isCryptoStatRow(row) {
        return isCryptoSentimentRow(row) || isCryptoTotalRow(row);
      }

      function cryptoSentimentRow(data) {
        return asArr(data.crypto?.tape).find((row) => isCryptoSentimentRow(row));
      }

      function cryptoTotalStatRow(data) {
        const explicit = asArr(data.crypto?.tape).find((row) => isCryptoTotalRow(row));
        if (explicit) return explicit;
        const totalRow = asArr(data.tape?.rows).find((row) => isCryptoTotalRow(row));
        if (!totalRow) return null;
        return {
          sym: 'TOTAL',
          name: 'Crypto Market Cap',
          sub: 'Total Market Cap',
          price: totalRow.last,
          delta: totalRow.delta,
          dir: totalRow.dir
        };
      }

      function numericValue(text) {
        const value = Number(String(text || '').replace(/[$,%+,]/g, ''));
        return Number.isFinite(value) ? value : null;
      }

      function currencyDeltaFromText(deltaText) {
        const text = String(deltaText || '').trim();
        if (!text || text === 'Unavailable') return 'Unavailable';
        if (/[A-Za-z$]/.test(text)) return text;
        if (text.startsWith('-')) return `-$${text.slice(1)}`;
        if (text.startsWith('+')) return `+$${text.slice(1)}`;
        return `$${text}`;
      }

      function formatCryptoCurrencyDelta(delta, price) {
        if (!Number.isFinite(delta)) return 'Unavailable';
        const sign = delta > 0 ? '+' : delta < 0 ? '-' : '';
        const abs = Math.abs(delta);
        const decimals = price < 2 || abs < 0.01 ? 4 : abs >= 100 ? 0 : 2;
        return `${sign}$${new Intl.NumberFormat('en-US', {
          minimumFractionDigits: decimals,
          maximumFractionDigits: decimals
        }).format(abs)}`;
      }

      function cryptoDelta(row, data) {
        if (row?.delta) return currencyDeltaFromText(row.delta);
        const tapeRow = asArr(data.tape?.rows).find((item) => item.ticker === row?.sym);
        if (tapeRow?.delta) return currencyDeltaFromText(tapeRow.delta);
        const price = numericValue(row?.price);
        const pct = numericValue(row?.chg);
        if (!Number.isFinite(price) || !Number.isFinite(pct)) return 'Unavailable';
        const delta = price - (price / (1 + (pct / 100)));
        return formatCryptoCurrencyDelta(delta, price);
      }

      function sparkline(series, dir) {
        const points = asArr(series).map((point) => {
          const price = Array.isArray(point) ? Number(point[1]) : Number(point?.price ?? point?.value);
          return Number.isFinite(price) ? price : null;
        }).filter((price) => price !== null);
        if (points.length < 2) return '';

        const width = 220;
        const height = 76;
        const pad = 5;
        const min = Math.min(...points);
        const max = Math.max(...points);
        const range = max - min || 1;
        const step = (width - pad * 2) / (points.length - 1);
        const coords = points.map((price, index) => {
          const x = pad + index * step;
          const y = height - pad - ((price - min) / range) * (height - pad * 2);
          return [x, y];
        });
        const polyline = coords.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
        const area = `${pad},${height - pad} ${polyline} ${width - pad},${height - pad}`;
        return `
          <svg class="future-spark ${tone(dir)}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
            <line class="spark-grid" x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}"></line>
            <polygon class="spark-area" points="${area}"></polygon>
            <polyline class="spark-line" points="${polyline}"></polyline>
          </svg>
        `;
      }

      function section(label, title, note, body, className = '') {
        const sectionClass = className ? `section ${className}` : 'section';
        return `
          <section class="${sectionClass}">
            <div class="section-head">
              <div>
                <div class="section-label">${esc(label)}</div>
                <h2 class="section-title">${esc(title)}</h2>
              </div>
              ${note ? `<div class="section-note">${esc(note)}</div>` : ''}
            </div>
            ${body}
          </section>`;
      }

      function renderHero(data) {
        $('mast-vol').textContent = data.masthead?.volume || '';
        $('mast-date').textContent = data.masthead?.date || '';
        $('hero-headline').innerHTML = inline(data.opening?.headline || 'Today’s market brief');
        const catalysts = (asArr(data.opening?.catalysts).length ? asArr(data.opening.catalysts) : openingCatalysts(data)).map((item) => `
          <div class="catalyst-chip">
            <div class="label">${esc(item.label)}</div>
            <p>${esc(item.body)}</p>
          </div>
        `).join('');
        $('hero-copy').innerHTML = `
          <p class="opening-deck">${esc(data.opening?.deck || mondaySetup(data))}</p>
          <div class="catalyst-strip" aria-label="Opening catalysts">${catalysts}</div>
        `;
      }

      function renderTape(data) {
        const allRows = asArr(data.tape?.rows);
        const groups = TAPE_GROUPS.map((group) => {
          const rows = group.tickers
            .map((ticker) => allRows.find((row) => row.ticker === ticker))
            .filter(Boolean);
          if (!rows.length) return '';
          return `
            <section class="tape-group">
              <div class="tape-group-label">${esc(group.label)}</div>
              ${rows.map((row) => {
                const rowTone = tapeTone(row, group);
                return `
                <article class="tape-row ${rowTone}">
                  <div class="instrument"><strong class="entity-name entity-name-lg">${esc(row.name)}</strong><span class="entity-sub entity-sub-mono">${esc(row.ticker)}</span></div>
                  <div class="tape-signal">${esc(row.note)}</div>
                  <div class="quote-cluster" aria-label="${esc(row.name)} quote">
                    <div class="quote-last metric-primary">${esc(row.last)}</div>
                    <div class="metric-pair">
                      <div class="metric-value ${rowTone}">${esc(row.delta)}</div>
                      <div class="metric-sep">/</div>
                      <div class="metric-value ${rowTone}">${esc(row.pct)}</div>
                    </div>
                  </div>
                </article>
              `;
              }).join('')}
            </section>
          `;
        }).join('');
        return section('Market Record', 'The Tape', '', `<div class="tape-blotter surface surface-shadow surface-clip">${groups}</div>`, 'section-tape');
      }

      function renderPreMarket(data) {
        const futures = asArr(data.preMarket?.futures);
        const futuresRows = futures.length ? futures : [
          { label: 'S&P Futures', value: 'External result', body: 'Pre-market index-futures value and change.' },
          { label: 'Nasdaq Futures', value: 'External result', body: 'Growth and AI tone before the cash open.' },
          { label: 'Dow Futures', value: 'External result', body: 'Blue-chip and defensive leadership read.' },
          { label: 'Russell Futures', value: 'External result', body: 'Small-cap and domestic cyclicals read.' }
        ];
        const futuresHtml = futuresRows.slice(0, 4).map((item) => {
          const value = item.value || item.pct || item.change || 'External result';
          const isExternal = value === 'External result';
          return `
            <div class="future-card">
              <div class="label">${esc(item.label || item.name)}</div>
              <div class="value ${tone(item.dir)}">${isExternal ? '<span class="badge">External result</span>' : esc(value)}</div>
              <p>${esc(item.body || item.note || '')}</p>
              <div class="future-chart">${sparkline(item.series, item.dir)}</div>
            </div>
          `;
        }).join('');

        const sourceStories = (asArr(data.preMarket?.stories).length
          ? asArr(data.preMarket.stories)
          : asArr(data.stories)).slice(0, 3);
        const priorityKickers = ['Geopolitics', 'AI Leadership', 'Oil Risk'];
        const storyHtml = sourceStories.map((story, index) => {
          const url = safeUrl(story.url);
          return `
          <article class="premarket-item">
            <div class="label">${esc(story.preMarketTag || priorityKickers[index] || story.tag || story.kicker || 'Since Close')}</div>
            <div>
              <h3>${esc(story.title)}</h3>
              <p>${esc(story.body)}</p>
              ${url ? `<a class="story-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">Read more</a>` : ''}
            </div>
          </article>
        `;
        }).join('');

        return section('Before The Open', 'Pre-Market', '', `
          <div class="premarket">
            <div class="premarket-board surface surface-shadow" aria-label="Pre-market futures board">${futuresHtml}</div>
            <div class="premarket-news surface surface-shadow">${storyHtml}</div>
          </div>
        `, 'section-pre-market');
      }

      function portfolioMtdReturn(row) {
        if (!row) return '<span class="badge">Not in feed</span>';
        const rowTone = tone(row.mtdDir);
        return `
          <span class="metric-pair portfolio-card-return">
            <span class="metric-value ${rowTone}">${esc(row.mtdTR || 'Unavailable')}</span>
          </span>
        `;
      }

      function portfolioPrice(row) {
        if (!row) return '<span class="badge">Not in feed</span>';
        return esc(row.price);
      }

      function portfolioDividendInfo(row) {
        if (!row) return '';
        const dividends = asArr(row.dividends);
        if (!dividends.length || row.monthDivPerShare === '$0.00') return '';
        const dates = dividends.map((dividend) => dividend.exDate).filter(Boolean).join(', ');
        const tooltip = dates
          ? `MTD dividend ${row.monthDivPerShare} · Ex ${dates}`
          : `MTD dividend ${row.monthDivPerShare}`;
        return `<span class="div-info" tabindex="0" role="img" aria-label="${esc(tooltip)}" data-tooltip="${esc(tooltip)}">i</span>`;
      }

      function renderPortfolioUniverse(data) {
        const feedRows = asArr(data.assetAllocationPortfolio?.rows);
        const feedByTicker = new Map(feedRows.map((row) => [String(row.ticker).toUpperCase(), row]));
        const cards = ETF_UNIVERSE.map(([ticker, sleeve, swatch]) => {
          const row = feedByTicker.get(ticker);
          const title = PORTFOLIO_ASSET_TITLES[ticker] || row?.sleeve || sleeve;
          return `
          <article class="portfolio-card">
            <span class="swatch ${swatch}">&nbsp;</span>
            <div class="portfolio-card-main">
              <div class="portfolio-card-title entity-name">${esc(title)}</div>
              <div class="portfolio-card-ticker"><span>${esc(ticker)}</span>${portfolioDividendInfo(row)}</div>
            </div>
            <div class="portfolio-card-metrics">
              ${portfolioMtdReturn(row)}
              <div class="portfolio-card-price metric-primary">${portfolioPrice(row)}</div>
            </div>
          </article>
        `;
        }).join('');
        return `
          <section class="section portfolio-section section-portfolio surface surface-shadow">
            <div class="section-head">
              <div>
                <div class="section-label">Portfolio</div>
                <h2 class="section-title">Asset Allocation</h2>
              </div>
              <div class="section-context">MTD Return</div>
            </div>
            <div class="portfolio-grid">${cards}</div>
            ${feedRows.length ? '' : '<p class="portfolio-source-note">ETF market-data feed is unavailable; tracked instruments are shown without fabricated values.</p>'}
          </section>
        `;
      }

      function renderStories(data) {
        const cards = asArr(data.stories).map((story) => {
          const url = safeUrl(story.url);
          return `
            <article class="story surface card card-tall">
              <div class="tag ${tone(story.tone)}">${esc(story.tag)}</div>
              <h3>${esc(story.title)}</h3>
              <p>${esc(story.body)}</p>
              ${url ? `<a class="story-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">Read more</a>` : ''}
            </article>
          `;
        }).join('');
        return section('News Flow', 'What’s Moving Today', '', `<div class="story-grid">${cards}</div>`, 'section-news');
      }

      function renderCrypto(data) {
        const c = asObj(data.crypto);
        const sentiment = cryptoSentimentRow(data);
        const totalStat = cryptoTotalStatRow(data);
        const rows = cryptoTapeRows(data).map((row) => {
          const rowTone = tone(row.dir);
          const sub = row.sub || row.sym || row.ticker || '';
          const change = `<div class="metric-pair"><div class="metric-value ${rowTone}">${esc(cryptoDelta(row, data))}</div><div class="metric-sep">/</div><div class="metric-value ${rowTone}">${esc(row.chg)}</div></div>`;
          return `
            <div class="crypto-row">
              <div class="name entity-name">${esc(row.name)}<span class="entity-sub">${esc(sub)}</span></div>
              <div class="crypto-quote">
                <div class="price metric-primary">${esc(row.price)}</div>
                ${change}
              </div>
            </div>
          `;
        }).join('');
        const cryptoStatCard = (stat, label) => {
          if (!stat) return '';
          const change = stat.delta || stat.chg || '';
          return `
          <div class="crypto-stat surface card">
            <div class="tag crypto">${esc(label)}</div>
            <div class="crypto-stat-line">
              <div class="crypto-stat-copy">
                <h3 class="entity-name">${esc(stat.name)}</h3>
                <p class="entity-sub">${esc(stat.sub)}</p>
              </div>
              <div class="crypto-stat-values">
                <strong class="metric-primary">${esc(stat.price)}</strong>
                ${change ? `<span class="metric-value ${tone(stat.dir)}">${esc(change)}</span>` : ''}
              </div>
            </div>
          </div>
        `;
        };
        const statsHtml = [cryptoStatCard(totalStat, 'Market Cap'), cryptoStatCard(sentiment, 'Sentiment')].join('');
        const notes = asArr(c.notes).map((note) => {
          const url = safeUrl(note.url);
          return `
            <article class="crypto-note surface card card-tall">
              <div class="tag crypto">${esc(note.kicker)}</div>
              <h3>${esc(note.title)}</h3>
              <p>${inline(note.body)}</p>
              ${url ? `<a class="story-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">Read more</a>` : ''}
            </article>
          `;
        }).join('');
        return section('Digital Assets', 'Crypto', '', `
          <div class="story-grid crypto-grid">
            <div class="crypto-left">
              <div class="crypto-tape surface surface-shadow surface-clip">
                <h3>${esc(c.tapeHeader)}</h3>
                ${rows}
              </div>
              ${statsHtml}
            </div>
            <div class="crypto-notes">
              ${notes}
            </div>
          </div>
        `, 'section-crypto');
      }

      function earningsMoveClass(tile) {
        const role = String(tile.moveRole || tile.moveType || '').trim().toLowerCase();
        const text = String(tile.move || '').trim();
        const moveTone = tone(tile.moveDir);
        const hasDirectionalTone = moveTone === 'up' || moveTone === 'down';
        const isPending = /\b(consensus|estimate|estimated|expected|expects|seen|preview|pending)\b/i.test(text);
        const isMarketReaction = /\b(stock|shares|premarket|pre-market|after[-\s]?hours|market reaction|price reaction)\b/i.test(text);
        const isLabeledSurprise = /\b(beat|miss|surprise)\b/i.test(text);

        if (/(pending|consensus|estimate|preview)/.test(role)) return 'flat';
        if (/(reported|fundamental|guidance)/.test(role)) return '';
        if (/(market|reaction|price|stock|shares)/.test(role)) return moveTone;
        if (/surprise/.test(role)) return isLabeledSurprise && hasDirectionalTone ? moveTone : '';
        if (isPending) return 'flat';
        if ((isMarketReaction || isLabeledSurprise) && hasDirectionalTone) return moveTone;
        return '';
      }

      function renderEarnings(data) {
        const cards = asArr(data.earnings?.tiles).map((tile) => `
          <article class="earn surface card card-tall">
            <div class="tag ${tone(tile.tone)}">${esc(tile.co)}</div>
            <h3 class="${earningsMoveClass(tile)}">${esc(tile.move)}</h3>
            <p>${esc(tile.body)}</p>
          </article>
        `).join('');
        return section('Single Stocks', 'Earnings', '', `<div class="earnings-grid">${cards}</div>`, 'section-earnings');
      }

      function renderWeekAhead(data) {
        const rows = asArr(data.weekAhead?.rows).map((row) => `
          <div class="week-row">
            <div class="week-day">${esc(row.day)}</div>
            <div class="week-event">${inline(row.event)}</div>
            <div class="week-tickers">${esc(row.tickers)}</div>
          </div>
        `).join('');
        return section('Calendar', 'The Week Ahead', '', `<div class="week surface surface-shadow">${rows}</div>`, 'section-week-ahead');
      }

      function compactCompiledText(data) {
        const raw = String(data.footer?.compiled || '');
        const disclaimer = String(data.footer?.disclaimer || 'Not investment advice').trim();
        if (!raw) return disclaimer;
        if (raw.toLowerCase().includes(disclaimer.toLowerCase())) return raw;
        const compiled = raw.replace(/[.\s]+$/, '');
        return `${compiled} · ${disclaimer}`;
      }

      function renderFooter(data) {
        $('footer').innerHTML = `
          <div>${esc(compactCompiledText(data))}</div>
        `;
      }

      function render(data) {
        renderHero(data);
        $('content').innerHTML = [
          renderPreMarket(data),
          renderTape(data),
          renderPortfolioUniverse(data),
          renderStories(data),
          renderCrypto(data),
          renderEarnings(data),
          renderWeekAhead(data)
        ].join('');
        renderFooter(data);
      }

      function loadData() {
        // Production is intentionally self-contained so daily updates can edit only the embedded JSON block.
        const node = document.getElementById('dashboard-data');
        if (!node) throw new Error('The dashboard-data JSON block was not found.');
        return JSON.parse(node.textContent || '{}');
      }

      try {
        render(loadData());
      } catch (error) {
        $('hero-headline').textContent = 'Could not load today’s dashboard data.';
        $('hero-copy').textContent = 'The embedded dashboard-data JSON block could not be parsed.';
        $('content').innerHTML = `<div class="error">${esc(error.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
