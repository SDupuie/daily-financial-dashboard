<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Daily Tape</title>
  <style>
    :root {
      --paper: #f7f8fa;
      --ink: #111317;
      --muted: #626a75;
      --line: #d9dee7;
      --panel: #ffffff;
      --panel-soft: #eef4f6;
      --blue: #2457ff;
      --teal: #0f9f8f;
      --red: #d64f45;
      --green: #18885b;
      --gold: #b8860b;
      --violet: #7357d6;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.06);
      --card-padding: 18px;
      --card-radius: 8px;
      --card-body-line: 1.4;
      --gap-xs: 6px;
      --gap-sm: 10px;
      --gap-md: 14px;
      --gap-lg: 18px;
      --gap-xl: 22px;
      --label-size: 10px;
      --label-weight: 900;
      --label-spacing: 0.14em;
    }
    * { box-sizing: border-box; }
    html { background: var(--paper); color: var(--ink); }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      background: var(--paper);
    }
    a { color: inherit; }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 26px 22px 60px;
    }
    .topline {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: var(--gap-xl);
      align-items: center;
      border-top: 5px solid var(--ink);
      border-bottom: 1px solid var(--line);
      padding: 16px 0;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .topline .right { text-align: right; }
    .brand {
      text-align: center;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 6vw, 76px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: none;
    }
    .brand span {
      color: var(--blue);
      font-style: italic;
      font-weight: 500;
    }
    .opening-board {
      padding: 22px 0 0;
    }
    .opening-main { min-width: 0; }
    .opening-main h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 0;
    }
    .opening-deck {
      margin: 12px 0 0;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.45;
    }
    .catalyst-strip {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--panel);
      overflow: hidden;
    }
    .catalyst-chip {
      padding: var(--card-padding);
      border-right: 1px solid var(--line);
    }
    .catalyst-chip:last-child { border-right: none; }
    .catalyst-chip .label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
    }
    .catalyst-chip p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: var(--card-body-line);
    }
    .up, .green { color: var(--green); }
    .down, .red, .loss { color: var(--red); }
    .flat, .mix { color: var(--muted); }
    .amber, .fed { color: var(--gold); }
    .surface {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
    }
    .surface-shadow { box-shadow: var(--shadow); }
    .surface-clip { overflow: hidden; }
    .card {
      padding: var(--card-padding);
      display: grid;
      align-content: start;
      gap: var(--gap-sm);
    }
    /* Shared editorial/story card typography used by news, crypto notes, and earnings. */
    .editorial-card h3 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .editorial-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: var(--card-body-line);
    }
    .entity-name {
      min-width: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      font-size: 15px;
      font-weight: 850;
      line-height: 1.12;
      letter-spacing: 0;
    }
    .entity-name-lg {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.1;
    }
    .entity-sub {
      display: block;
      color: var(--muted);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 10.5px;
      font-weight: 650;
      line-height: 1.25;
      margin-top: 2px;
    }
    .entity-sub-mono {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
    }
    .metric-primary {
      color: var(--ink);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
    }
    .quote-readout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 5px;
      align-items: baseline;
      justify-items: end;
      font-family: "SFMono-Regular", Consolas, monospace;
      white-space: nowrap;
    }
    /* Tape and crypto quotes share the stacked price-over-change readout. */
    .quote-row {
      display: grid;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
    }
    .section { margin-top: 34px; }
    .section-pre-market,
    .section-crypto,
    .section-week-ahead { margin-top: 28px; }
    .section-portfolio { margin-top: 40px; }
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: var(--gap-lg);
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }
    .section-label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .section-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1;
      letter-spacing: 0;
    }
    .section-note {
      color: var(--muted);
      font-size: 13px;
      max-width: 460px;
      text-align: right;
    }
    .table-card { overflow: hidden; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      background: #eef1f6;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    td {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      font-size: 14px;
    }
    tr:last-child td { border-bottom: none; }
    td.num, th.num {
      text-align: right;
      font-family: "SFMono-Regular", Consolas, monospace;
      white-space: nowrap;
    }
    .instrument { display: grid; gap: 2px; }
    .tape-group {
      border-bottom: 1px solid var(--line);
    }
    .tape-group:last-child { border-bottom: none; }
    .tape-group-label {
      padding: 8px 14px;
      background: #f8fafc;
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
    }
    .tape-row {
      grid-template-columns: 190px minmax(0, 1fr) 170px;
      gap: var(--gap-lg);
      align-items: center;
      padding: 12px 14px;
    }
    .tape-row:last-child { border-bottom: none; }
    .tape-row.up { border-left: 3px solid var(--green); }
    .tape-row.down { border-left: 3px solid var(--red); }
    .tape-row.flat,
    .tape-row.mix { border-left: 3px solid transparent; }
    .tape-signal {
      color: var(--ink);
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      font-size: 14px;
      line-height: 1.35;
    }
    .quote-cluster {
      min-width: 150px;
    }
    .quote-last { text-align: right; }
    .metric-pair {
      display: inline-flex;
      justify-content: flex-end;
      gap: 6px;
      width: 100%;
      white-space: nowrap;
    }
    .metric-value,
    .metric-sep {
      font-size: 13px;
      font-weight: 850;
    }
    .metric-sep { color: var(--muted); }
    .metric-value.up { color: var(--green); }
    .metric-value.down { color: var(--red); }
    .metric-value.flat,
    .metric-value.mix { color: var(--muted); }
    .portfolio-section { padding: 18px; }
    .portfolio-section .section-head {
      margin-bottom: 12px;
      border-bottom-color: var(--line);
    }
    .portfolio-section .section-note { text-align: left; }
    .portfolio-total-return {
      display: grid;
      justify-items: end;
      gap: 2px;
      text-align: right;
      white-space: nowrap;
    }
    .portfolio-total-value {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 23px;
      font-weight: 900;
      line-height: 1.05;
    }
    .portfolio-total-label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      line-height: 1.2;
      text-transform: uppercase;
    }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--gap-sm);
    }
    .portfolio-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--gap-md);
      align-items: center;
      padding: 14px 16px;
      min-height: 88px;
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--panel);
    }
    .portfolio-card-main {
      min-width: 0;
    }
    .portfolio-card-title {
      font-size: 14px;
      font-weight: 850;
      line-height: 1.15;
    }
    .portfolio-card-ticker {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      color: #1f2937;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.02em;
    }
    .portfolio-card-metrics {
      display: grid;
      gap: 8px;
      justify-items: end;
      text-align: right;
      white-space: nowrap;
    }
    .portfolio-card-return {
      justify-content: end;
      width: auto;
    }
    .portfolio-card-return .metric-value,
    .portfolio-card-return .metric-sep {
      font-size: 17px;
    }
    .portfolio-card-price {
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.05;
    }
    .portfolio-source-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f5f7fa;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 7px;
      white-space: nowrap;
    }
    .asset {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--ink);
    }
    .asset strong { color: var(--ink); }
    .dividend-cell {
      color: var(--muted);
      font-weight: 650;
      line-height: 1.25;
    }
    .dividend-value {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      width: 100%;
    }
    .dividend-badges {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .div-info {
      position: relative;
      display: inline-flex;
      align-items: center;
    }
    .div-info-button {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--muted);
      background: #f8fafc;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      cursor: help;
      outline: none;
      padding: 0;
    }
    .div-info-button--current {
      border-color: #bfd4ff;
      background: #f3f7ff;
      color: var(--blue);
    }
    .div-info-button--upcoming {
      border-color: #dfc26f;
      background: #fff9e8;
      color: #98710a;
    }
    .div-info-button--future {
      border-color: #c9bff2;
      background: #f6f3ff;
      color: var(--violet);
    }
    .div-info-button:hover,
    .div-info-button:focus-visible {
      border-color: currentColor;
    }
    .div-tooltip {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 5;
      display: grid;
      gap: 5px;
      min-width: 230px;
      max-width: min(260px, calc(100vw - 32px));
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--panel);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 11.5px;
      font-weight: 650;
      line-height: 1.35;
      text-align: left;
      white-space: normal;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(3px);
      transition: opacity 120ms ease, transform 120ms ease;
    }
    .div-tooltip strong {
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
    }
    .div-tooltip span { color: var(--muted); }
    .div-info:hover .div-tooltip,
    .div-info:focus-within .div-tooltip,
    .div-info.is-open .div-tooltip {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .swatch {
      width: 12px;
      height: 36px;
      border-radius: 3px;
      background: #2563eb;
      font-size: 0;
      line-height: 0;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .swatch.vti { background: #2563eb; }
    .swatch.vea { background: #16a34a; }
    .swatch.vwo { background: #db2777; }
    .swatch.vnq { background: #7c3aed; }
    .swatch.dbc { background: #7c2d12; }
    .swatch.gld { background: #ca8a04; }
    .swatch.ief { background: #0891b2; }
    .swatch.boxx { background: #475569; }
    .story-grid,
    .earnings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--gap-md);
      align-items: start;
    }
    .crypto-grid {
      align-items: start;
      grid-template-columns: minmax(0, 1fr) minmax(0, 2fr);
    }
    .crypto-left {
      display: grid;
      gap: var(--gap-md);
      align-items: start;
    }
    .crypto-notes {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--gap-md);
      align-items: start;
    }
    .tag {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
    }
    .tag.geo,
    .tag.loss,
    .tag.corp,
    .tag.win,
    .tag.fed,
    .tag.macro,
    .tag.crypto { color: var(--blue); }
    .story-link {
      align-self: end;
      justify-self: start;
      color: var(--blue);
      border-bottom: 1px solid currentColor;
      text-decoration: none;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .crypto-tape { min-height: 190px; }
    .crypto-grid .crypto-tape { grid-column: 1; }
    .crypto-row {
      grid-template-columns: minmax(0, 1fr) minmax(218px, 230px);
      gap: var(--gap-lg);
      align-items: baseline;
      padding: 12px 18px;
    }
    .crypto-row .name {
      display: block;
    }
    .crypto-row .name span {
      display: block;
    }
    .crypto-quote {
      min-width: 150px;
    }
    .crypto-row .price { text-align: right; }
    .crypto-stat { min-height: 90px; }
    .crypto-stat-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--gap-md);
      align-items: start;
    }
    .crypto-stat-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .crypto-stat h3 {
      margin: 0;
    }
    .crypto-stat p {
      margin: 0;
    }
    .crypto-stat-values {
      display: grid;
      gap: 4px;
      justify-items: end;
      font-family: "SFMono-Regular", Consolas, monospace;
      white-space: nowrap;
    }
    .crypto-stat-values strong { text-align: right; }
    .dominance-module {
      display: grid;
      gap: var(--gap-sm);
      margin-top: 0;
    }
    .dominance-labels {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--gap-md);
    }
    .dominance-label {
      display: grid;
      gap: 3px;
      min-width: 0;
    }
    .dominance-name {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      line-height: 1.1;
    }
    .dominance-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue);
      flex: 0 0 auto;
    }
    .dominance-value {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
      font-weight: 850;
      line-height: 1.1;
    }
    .dominance-bar {
      display: flex;
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5e7eb;
    }
    .dominance-segment.btc,
    .dominance-dot.btc { background: #2563eb; }
    .dominance-segment.eth,
    .dominance-dot.eth { background: #16a34a; }
    .dominance-segment.others,
    .dominance-dot.others { background: #ef4444; }
    .fear-greed-gauge {
      position: relative;
      width: min(190px, 100%);
      height: 42px;
      margin: 0;
      overflow: visible;
    }
    .sentiment-stat .crypto-stat-line {
      grid-template-columns: minmax(0, 1fr) 190px;
      align-items: start;
    }
    .sentiment-stat .crypto-stat-values {
      width: 190px;
      justify-items: center;
    }
    .fear-greed-arc {
      position: absolute;
      top: -31px;
      left: 50%;
      width: 142px;
      height: 142px;
      border-radius: 50%;
      background:
        conic-gradient(
          from 270deg,
          #ef4444 0deg 45deg,
          #f59e0b 45deg 81deg,
          #facc15 81deg 99deg,
          #84cc16 99deg 135deg,
          #10b981 135deg 180deg,
          transparent 180deg 360deg
        );
      transform: translateX(-50%);
      -webkit-mask: radial-gradient(circle, transparent 0 55px, #000 56px 63px, transparent 64px);
      mask: radial-gradient(circle, transparent 0 55px, #000 56px 63px, transparent 64px);
    }
    .fear-greed-pointer {
      position: absolute;
      top: 40px;
      left: 50%;
      z-index: 2;
      width: 0;
      height: 0;
      transform: rotate(var(--pointer-angle));
      transform-origin: 0 0;
    }
    .fear-greed-pointer::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 57px;
      width: 10px;
      height: 10px;
      border: 2px solid var(--panel);
      border-radius: 50%;
      background: var(--ink);
      box-sizing: border-box;
    }
    .fear-greed-center {
      position: absolute;
      top: 0;
      left: 50%;
      z-index: 3;
      display: grid;
      justify-items: center;
      transform: translateX(-50%);
    }
    .fear-greed-score {
      color: var(--ink);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 30px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0;
    }
    .fear-greed-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      line-height: 1.1;
      white-space: nowrap;
    }
    .week { overflow: hidden; }
    .premarket {
      display: grid;
      grid-template-columns: minmax(0, 0.82fr) minmax(0, 1.18fr);
      gap: var(--gap-lg);
      align-items: stretch;
    }
    .premarket-board,
    .premarket-news {
      overflow: hidden;
    }
    .premarket-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
    }
    .premarket-news {
      display: grid;
      grid-auto-rows: minmax(0, 1fr);
    }
    .future-card {
      min-height: 166px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);

        row-gap: var(--gap-sm);
        align-items: start;

        grid-area: quote;
        min-width: max-content;
        justify-content: end;
        justify-items: end;
      }
      .metric-pair { width: auto; }
      .week-row { grid-template-columns: 1fr; gap: var(--gap-xs); }
      .week-tickers { text-align: left; }
    }

  <script>
    (function () {
      const ETF_UNIVERSE = [
        ['VTI', 'U.S. total market equity', 'vti'],
        ['VEA', 'Developed ex-U.S. equity', 'vea'],
        ['VWO', 'Emerging markets equity', 'vwo'],
        ['VNQ', 'U.S. real estate', 'vnq'],
        ['DBC', 'Broad commodities', 'dbc'],
        ['GLD', 'Gold', 'gld'],
        ['IEF', '7-10Y U.S. Treasuries', 'ief'],
        ['BOXX', 'Cash / T-bill alternative', 'boxx']
      ];
      const PORTFOLIO_ASSET_TITLES = {
        VTI: 'U.S. Total Market',
        VEA: 'Developed ex-U.S.',
        VWO: 'Emerging Markets',
        VNQ: 'U.S. Real Estate',
        DBC: 'Commodities',
        GLD: 'Gold',
        IEF: '7-10Y Treasuries',
        BOXX: 'T-Bill Alternative'
      };
      const $ = (id) => document.getElementById(id);
      const asArr = (v) => Array.isArray(v) ? v : [];
      const asObj = (v) => v && typeof v === 'object' ? v : {};
      const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
      const inline = (v) => esc(v).replace(/&lt;(\/?)(strong|em)&gt;/g, '<$1$2>');
      const sentenceCase = (value) => String(value ?? '').replace(/^(\s*)([a-z])/, (_match, lead, first) => `${lead}${first.toUpperCase()}`);
      const safeUrl = (value) => {
        const raw = String(value ?? '').trim();
        if (!raw) return '';
        try {
          const url = new URL(raw, window.location.href);
          return url.protocol === 'https:' ? url.href : '';
        } catch (_error) {
          return '';
        }
      };
      const tone = (value) => {
        const raw = String(value ?? '').trim();
        return ['up', 'down', 'flat', 'amber', 'green', 'red', 'macro', 'geo', 'corp', 'fed', 'crypto', 'win', 'loss', 'mix'].includes(raw) ? raw : 'flat';
      };
      // Presentation grouping only; all daily market values still come from embedded tape.rows JSON.
      const TAPE_GROUPS = [
        { label: 'Domestic Equities', tickers: ['SPX', 'IXIC', 'DJI', 'RUT'] },
        { label: 'International Equities', tickers: ['MXEA', 'MXEF'] },
        { label: 'Real Estate', tickers: ['FNER'] },
        { label: 'Commodities', tickers: ['GSCI', 'XAU', 'XAG', 'CL'] },
        { label: 'Rates / Vol', tickers: ['VIX', 'MOVE', 'UST10Y', 'UST30Y'], invertTone: true },
        { label: 'Bonds', tickers: ['IEF', 'AGG', 'LQD', 'HYG'] }
      ];
      function tapeTone(row, group) {
        const value = tone(row?.dir);
        if (!group?.invertTone) return value;
        if (value === 'up') return 'down';
        if (value === 'down') return 'up';
        return value;
      }

      function mondaySetup(data) {
        const subhead = String(data.opening?.deck || '');
        const parts = subhead.split(/ · Monday setup:\s*/i);
        if (parts.length > 1) return sentenceCase(parts.pop());
        const match = subhead.match(/Monday setup:\s*(.*)$/i);
        if (match) return sentenceCase(match[1]);
        return sentenceCase(data.opening?.headline || 'The setup is still developing.');
      }

      function openingCatalysts(data) {
        const setup = mondaySetup(data);
        const catalysts = [
          {
            label: 'Geopolitics',
            body: /iran|gulf|truce/i.test(setup)
              ? 'Gulf truce headlines are still setting the overnight risk tone.'
              : 'Overnight headlines are setting the first risk check.'
          },
          {
            label: 'Positioning',
            body: /quarter.end|rotation/i.test(setup)
              ? 'Quarter-end rotation is keeping leadership fragile.'
              : 'Positioning is shaping the first move before cash trading.'
          },
          {
            label: 'Calendar',
            body: /jobs/i.test(setup)
              ? 'Jobs week is the next macro test for yields and risk appetite.'
              : 'The calendar is the next test for yields and risk appetite.'
          },
          {
            label: 'Leadership',
            body: /AI|tech|software/i.test(setup)
              ? 'AI fatigue is still weighing on tech leadership.'
              : 'Leadership quality remains the key tell inside the tape.'
          }
        ];
        return catalysts;
      }

      function cryptoTapeRows(data) {
        const rows = [...asArr(data.crypto?.tape)];
        const hasTotal = rows.some((row) => row.sym === 'TOTAL' || /(?:total )?crypto market cap/i.test(row.name || ''));
        const totalRow = asArr(data.tape?.rows).find((row) => row.ticker === 'TOTAL');
        if (!hasTotal && totalRow) {
          rows.push({
            sym: 'TOTAL',
            name: 'Crypto Market Cap',
            sub: 'Total Market Cap',
            price: totalRow.last,
            delta: totalRow.delta,
            chg: totalRow.pct,
            dir: totalRow.dir
          });
        }
        return rows.filter((row) => !isCryptoStatRow(row));
      }

      function isCryptoSentimentRow(row) {
        return row?.sym === 'F&G' || /fear\s*&?\s*greed/i.test(row?.name || '');
      }

      function isCryptoTotalRow(row) {
        return row?.sym === 'TOTAL' || row?.ticker === 'TOTAL' || /(?:total )?crypto market cap/i.test(row?.name || '');
      }

      function isCryptoStatRow(row) {
        return isCryptoSentimentRow(row) || isCryptoTotalRow(row);
      }

      function cryptoSentimentRow(data) {
        return asArr(data.crypto?.tape).find((row) => isCryptoSentimentRow(row));
      }

      function cryptoTotalStatRow(data) {
        const explicit = asArr(data.crypto?.tape).find((row) => isCryptoTotalRow(row));
        if (explicit) return explicit;
        const totalRow = asArr(data.tape?.rows).find((row) => isCryptoTotalRow(row));
        if (!totalRow) return null;
        return {
          sym: 'TOTAL',
          name: 'Crypto Market Cap',
          sub: 'Total Market Cap',
          price: totalRow.last,
          delta: totalRow.delta,
          dir: totalRow.dir
        };
      }

      function numericValue(text) {
        const value = Number(String(text || '').replace(/[$,%+,]/g, ''));
        return Number.isFinite(value) ? value : null;
      }

      function formatSignedPercent(value) {
        if (!Number.isFinite(value)) return 'Unavailable';
        return `${new Intl.NumberFormat('en-US', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
          signDisplay: 'always'
        }).format(value)}%`;
      }

      function currencyDeltaFromText(deltaText) {
        const text = String(deltaText || '').trim();
        if (!text || text === 'Unavailable') return 'Unavailable';
        if (/[A-Za-z$]/.test(text)) return text;
        if (text.startsWith('-')) return `-$${text.slice(1)}`;
        if (text.startsWith('+')) return `+$${text.slice(1)}`;
        return `$${text}`;
      }

      function formatCryptoCurrencyDelta(delta, price) {
        if (!Number.isFinite(delta)) return 'Unavailable';
        const sign = delta > 0 ? '+' : delta < 0 ? '-' : '';
        const abs = Math.abs(delta);
        const decimals = price < 2 || abs < 0.01 ? 4 : abs >= 100 ? 0 : 2;
        return `${sign}$${new Intl.NumberFormat('en-US', {
          minimumFractionDigits: decimals,
          maximumFractionDigits: decimals
        }).format(abs)}`;
      }

      function cryptoDelta(row, data) {
        if (row?.delta) return currencyDeltaFromText(row.delta);
        const tapeRow = asArr(data.tape?.rows).find((item) => item.ticker === row?.sym);
        if (tapeRow?.delta) return currencyDeltaFromText(tapeRow.delta);
        const price = numericValue(row?.price);
        const pct = numericValue(row?.chg);
        if (!Number.isFinite(price) || !Number.isFinite(pct)) return 'Unavailable';
        const delta = price - (price / (1 + (pct / 100)));
        return formatCryptoCurrencyDelta(delta, price);
      }

      function sparkline(series, dir, previousClose) {
        const points = asArr(series).map((point) => {
          const price = Array.isArray(point) ? Number(point[1]) : Number(point?.price ?? point?.value);
          return Number.isFinite(price) ? price : null;
        }).filter((price) => price !== null);
        if (points.length < 2) return '';

        const width = 220;
        const height = 76;
        const pad = 5;
        const referencePrice = Number(previousClose);
        const hasReference = Number.isFinite(referencePrice);
        // Include previous close in the domain so the reference line is never clipped off-chart.
        const scalePoints = hasReference ? points.concat(referencePrice) : points;
        const min = Math.min(...scalePoints);
        const max = Math.max(...scalePoints);
        const range = max - min || 1;
        const step = (width - pad * 2) / (points.length - 1);
        const yForPrice = (price) => height - pad - ((price - min) / range) * (height - pad * 2);
        const coords = points.map((price, index) => {
          const x = pad + index * step;
          const y = yForPrice(price);
          return { price, x, y };
        });
        const polyline = coords.map(({ x, y }) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
        const area = `${pad},${height - pad} ${polyline} ${width - pad},${height - pad}`;
        const referenceY = hasReference ? yForPrice(referencePrice) : null;
        // Split segments at the previous-close crossing so green/red always reflects above/below close.
        const splitSegments = hasReference
          ? coords.slice(1).flatMap((end, index) => {
            const start = coords[index];
            const startDiff = start.price - referencePrice;
            const endDiff = end.price - referencePrice;
            const side = (diff, fallbackDiff) => (diff > 0 || (diff === 0 && fallbackDiff >= 0) ? 'above' : 'below');
            const segment = (from, to, segmentSide) => ({ from, to, side: segmentSide });
            if (startDiff === 0 || endDiff === 0 || Math.sign(startDiff) === Math.sign(endDiff)) {
              return [segment(start, end, side(startDiff, endDiff))];
            }
            const ratio = (referencePrice - start.price) / (end.price - start.price);
            const cross = {
              price: referencePrice,
              x: start.x + (end.x - start.x) * ratio,
              y: referenceY
            };
            return [
              segment(start, cross, side(startDiff, endDiff)),
              segment(cross, end, side(endDiff, startDiff))
            ];
          })
          : [];
        const segmentAreas = splitSegments.map(({ from, to, side }) => `
          <polygon class="spark-area spark-area--${side}" points="${from.x.toFixed(1)},${referenceY.toFixed(1)} ${from.x.toFixed(1)},${from.y.toFixed(1)} ${to.x.toFixed(1)},${to.y.toFixed(1)} ${to.x.toFixed(1)},${referenceY.toFixed(1)}"></polygon>
        `).join('');
        const segmentLines = splitSegments.map(({ from, to, side }) => `
          <line class="spark-line spark-line--${side}" x1="${from.x.toFixed(1)}" y1="${from.y.toFixed(1)}" x2="${to.x.toFixed(1)}" y2="${to.y.toFixed(1)}"></line>
        `).join('');
        const referenceLine = hasReference
          ? `<line class="spark-reference" x1="${pad}" y1="${referenceY.toFixed(1)}" x2="${width - pad}" y2="${referenceY.toFixed(1)}"></line>`
          : '';
        return `
          <svg class="future-spark ${tone(dir)}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
            ${hasReference ? segmentAreas : `<polygon class="spark-area" points="${area}"></polygon>`}
            ${referenceLine}
            ${hasReference ? segmentLines : `<polyline class="spark-line" points="${polyline}"></polyline>`}
          </svg>
        `;
      }

      function section(label, title, note, body, className = '') {
        const sectionClass = className ? `section ${className}` : 'section';
        return `
          <section class="${sectionClass}">
            <div class="section-head">
              <div>
                <div class="section-label">${esc(label)}</div>
                <h2 class="section-title">${esc(title)}</h2>
              </div>
              ${note ? `<div class="section-note">${esc(note)}</div>` : ''}
            </div>
            ${body}
          </section>`;
      }

      function renderHero(data) {
        $('mast-vol').textContent = data.masthead?.volume || '';
        $('mast-date').textContent = data.masthead?.date || '';
        $('hero-headline').innerHTML = inline(data.opening?.headline || 'Today’s market brief');
        const catalysts = (asArr(data.opening?.catalysts).length ? asArr(data.opening.catalysts) : openingCatalysts(data)).map((item) => `
          <div class="catalyst-chip">
            <div class="label">${esc(item.label)}</div>
            <p>${esc(item.body)}</p>
          </div>
        `).join('');
        $('hero-copy').innerHTML = `
          <p class="opening-deck">${esc(data.opening?.deck || mondaySetup(data))}</p>
          <div class="catalyst-strip" aria-label="Opening catalysts">${catalysts}</div>
        `;
      }

      function renderTape(data) {
        const allRows = asArr(data.tape?.rows);
        const groups = TAPE_GROUPS.map((group) => {
          const rows = group.tickers
            .map((ticker) => allRows.find((row) => row.ticker === ticker))
            .filter(Boolean);
          if (!rows.length) return '';
          return `
            <section class="tape-group">
              <div class="tape-group-label">${esc(group.label)}</div>
              ${rows.map((row) => {
                const rowTone = tapeTone(row, group);
                return `
                <article class="quote-row tape-row ${rowTone}">
                  <div class="instrument"><strong class="entity-name entity-name-lg">${esc(row.name)}</strong><span class="entity-sub entity-sub-mono">${esc(row.ticker)}</span></div>
                  <div class="tape-signal">${esc(row.note)}</div>
                  <div class="quote-cluster quote-readout" aria-label="${esc(row.name)} quote">
                    <div class="quote-last metric-primary">${esc(row.last)}</div>
                    <div class="metric-pair">
                      <div class="metric-value ${rowTone}">${esc(row.delta)}</div>
                      <div class="metric-sep">/</div>
                      <div class="metric-value ${rowTone}">${esc(row.pct)}</div>
                    </div>
                  </div>
                </article>
              `;
              }).join('')}
            </section>
          `;
        }).join('');
        return section('Market Record', 'The Tape', '', `<div class="tape-blotter surface surface-shadow surface-clip">${groups}</div>`, 'section-tape');
      }

      function renderPreMarket(data) {
        const futures = asArr(data.preMarket?.futures);
        const futuresRows = futures.length ? futures : [
          { label: 'S&P Futures', value: 'External result', body: 'Pre-market index-futures value and change.' },
          { label: 'Nasdaq Futures', value: 'External result', body: 'Growth and AI tone before the cash open.' },
          { label: 'Dow Futures', value: 'External result', body: 'Blue-chip and defensive leadership read.' },
          { label: 'Russell Futures', value: 'External result', body: 'Small-cap and domestic cyclicals read.' }
        ];
        const futuresHtml = futuresRows.slice(0, 4).map((item) => {
          const value = item.value || item.pct || item.change || 'External result';
          const isExternal = value === 'External result';
          return `
            <div class="future-card">
              <div class="label">${esc(item.label || item.name)}</div>
              <div class="value ${tone(item.dir)}">${isExternal ? '<span class="badge">External result</span>' : esc(value)}</div>
              <p>${esc(item.body || item.note || '')}</p>
              <div class="future-chart">${sparkline(item.series, item.dir, item.raw?.previousClose)}</div>
            </div>
          `;
        }).join('');

        const sourceStories = (asArr(data.preMarket?.stories).length
          ? asArr(data.preMarket.stories)
          : asArr(data.stories)).slice(0, 3);
        const priorityKickers = ['Geopolitics', 'AI Leadership', 'Oil Risk'];
        const storyHtml = sourceStories.map((story, index) => {
          const url = safeUrl(story.url);
          return `
          <article class="premarket-item">
            <div class="label">${esc(story.preMarketTag || priorityKickers[index] || story.tag || story.kicker || 'Since Close')}</div>
            <div>
              <h3>${esc(story.title)}</h3>
              <p>${esc(story.body)}</p>
              ${url ? `<a class="story-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">Read more</a>` : ''}
            </div>
          </article>
        `;
        }).join('');

        return section('Before The Open', 'Pre-Market', '', `
          <div class="premarket">
            <div class="premarket-board surface surface-shadow" aria-label="Pre-market futures board">${futuresHtml}</div>
            <div class="premarket-news surface surface-shadow">${storyHtml}</div>
          </div>
        `, 'section-pre-market');
      }

      function portfolioMtdReturn(row) {
        if (!row) return '<span class="badge">Not in feed</span>';
        const rowTone = tone(row.mtdDir);
        return `
          <span class="metric-pair portfolio-card-return">
            <span class="metric-value ${rowTone}">${esc(row.mtdTR || 'Unavailable')}</span>
          </span>
        `;
      }

      function portfolioPrice(row) {
        if (!row) return '<span class="badge">Not in feed</span>';
        return esc(row.price);
      }

      function portfolioTotalReturn(data) {
        const portfolio = asObj(data.assetAllocationPortfolio);
        const value = Number(portfolio.portfolioMtdReturnValue);
        // Portfolio-level return is a sanitized display export; tactical model details stay outside this repo.
        const available = portfolio.portfolioMtdReturnStatus === 'available' && Number.isFinite(value);
        const stale = portfolio.portfolioMtdReturnStale === true;
        const asOf = String(portfolio.portfolioMtdReturnAsOf || '').trim();
        const label = available && stale && asOf
          ? `MTD Return · As of ${asOf}`
          : available
            ? 'MTD Return'
            : 'MTD Return · Unavailable';
        const labelClass = label === 'MTD Return' ? '' : ' portfolio-total-return--long';
        const valueClass = available ? tone(value > 0 ? 'up' : value < 0 ? 'down' : 'flat') : 'flat';
        return `
          <div class="portfolio-total-return${labelClass}">
            <div class="portfolio-total-value ${valueClass}">${available ? esc(formatSignedPercent(value)) : '--'}</div>
            <div class="portfolio-total-label">${esc(label)}</div>
          </div>
        `;
      }

      function formatDividendCurrency(value) {
        const amount = Number(value);
        if (!Number.isFinite(amount) || Math.abs(amount) < 0.00005) return '$0.00';
        return `$${new Intl.NumberFormat('en-US', {
          minimumFractionDigits: 4,
          maximumFractionDigits: 4
        }).format(amount)}`;
      }

      function sortedDividendEvents(events) {
        return asArr(events)
          .filter((event) => event && event.exDate)
          .sort((a, b) => String(a.exDate).localeCompare(String(b.exDate)));
      }

      function sumDividendEvents(events) {
        return asArr(events).reduce((sum, event) => {
          const amount = Number(event?.amount);
          return sum + (Number.isFinite(amount) ? amount : 0);
        }, 0);
      }

      function dividendAmountText(row, textKey, valueKey, events) {
        const value = Number(row?.[valueKey]);
        const fallbackValue = sumDividendEvents(events);
        const amount = Number.isFinite(value) ? value : fallbackValue;
        const display = String(row?.[textKey] ?? '').trim();
        if (!Number.isFinite(amount) || Math.abs(amount) < 0.00005) return '';
        if (display && display !== '$0.00' && display !== 'Unavailable') return display;
        return formatDividendCurrency(amount);
      }

      function dividendExDateText(events) {
        const dates = sortedDividendEvents(events).map((event) => String(event.exDate));
        if (dates.length === 1) return `Ex date ${dates[0]}`;
        if (dates.length > 1) return `Ex dates ${dates.join(', ')}`;
        return '';
      }

      function portfolioDividendBadge({ variant, title, ariaLabel, amount, events, inclusionText }) {
        if (!amount) return '';
        const exDateText = dividendExDateText(events);
        return `
          <span class="div-info div-info--${variant}" data-dividend-info>
            <button class="div-info-button div-info-button--${variant}" type="button" aria-label="${esc(ariaLabel)}" aria-expanded="false" data-dividend-button>D</button>
            <span class="div-tooltip" role="tooltip">
              <strong>${esc(title)}</strong>
              <span>${esc(amount)} / share</span>
              ${exDateText ? `<span>${esc(exDateText)}</span>` : ''}
              <span>${esc(inclusionText)}</span>
            </span>
          </span>
        `;
      }

      function portfolioDividendInfo(row) {
        if (!row) return '';
        const currentEvents = sortedDividendEvents(row.dividends);
        const upcomingEvents = sortedDividendEvents(row.upcomingCurrentMonthDividendEvents);
        const futureEvents = sortedDividendEvents(row.futureMonthDividendEvents);
        // Lookahead buckets are badges only; current/past ex-date dividends are the only MTD-return inputs.
        // Render at most two dividend badges so the compact portfolio cards do
        // not become a dividend calendar when several lookahead events exist.
        const badges = [
          portfolioDividendBadge({
            variant: 'current',
            title: 'Current Dividend',
            ariaLabel: `Current Dividend details for ${row.ticker}`,
            amount: dividendAmountText(row, 'monthDivPerShare', 'monthDivPerShareValue', currentEvents),
            events: currentEvents,
            inclusionText: 'Included in MTD return.'
          }),
          portfolioDividendBadge({
            variant: 'upcoming',
            title: 'Upcoming Dividend',
            ariaLabel: `Upcoming Dividend details for ${row.ticker}`,
            amount: dividendAmountText(row, 'upcomingCurrentMonthDividends', 'upcomingCurrentMonthDividendsValue', upcomingEvents),
            events: upcomingEvents,
            inclusionText: 'Not included in MTD return until the ex-date arrives.'
          }),
          portfolioDividendBadge({
            variant: 'future',
            title: 'Future Dividend',
            ariaLabel: `Future Dividend details for ${row.ticker}`,
            amount: dividendAmountText(row, 'futureMonthDividends', 'futureMonthDividendsValue', futureEvents),
            events: futureEvents,
            inclusionText: 'Not included in MTD return.'
          })
        ].filter(Boolean).slice(0, 2).join('');
        return badges ? `<span class="dividend-badges">${badges}</span>` : '';
      }

      function renderPortfolioUniverse(data) {
        const feedRows = asArr(data.assetAllocationPortfolio?.rows);
        const feedByTicker = new Map(feedRows.map((row) => [String(row.ticker).toUpperCase(), row]));
        const cards = ETF_UNIVERSE.map(([ticker, sleeve, swatch]) => {
          const row = feedByTicker.get(ticker);
          const title = PORTFOLIO_ASSET_TITLES[ticker] || row?.sleeve || sleeve;
          return `
          <article class="portfolio-card">
            <span class="swatch ${swatch}">&nbsp;</span>
            <div class="portfolio-card-main">
              <div class="portfolio-card-title entity-name">${esc(title)}</div>
              <div class="portfolio-card-ticker"><span>${esc(ticker)}</span>${portfolioDividendInfo(row)}</div>
            </div>
            <div class="portfolio-card-metrics">
              ${portfolioMtdReturn(row)}
              <div class="portfolio-card-price metric-primary">${portfolioPrice(row)}</div>
            </div>
          </article>
        `;
        }).join('');
        return `
          <section class="section portfolio-section section-portfolio surface surface-shadow">
            <div class="section-head">
              <div>
                <div class="section-label">Portfolio</div>
                <h2 class="section-title">Asset Allocation</h2>
              </div>
              ${portfolioTotalReturn(data)}
            </div>
            <div class="portfolio-grid">${cards}</div>
            ${feedRows.length ? '' : '<p class="portfolio-source-note">ETF market-data feed is unavailable; tracked instruments are shown without fabricated values.</p>'}
          </section>
        `;
      }

      function renderStories(data) {
        const cards = asArr(data.stories).map((story) => {
          const url = safeUrl(story.url);
          return `
            <article class="story editorial-card surface card">
              <div class="tag ${tone(story.tone)}">${esc(story.tag)}</div>
              <h3>${esc(story.title)}</h3>
              <p>${esc(story.body)}</p>
              ${url ? `<a class="story-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">Read more</a>` : ''}
            </article>
          `;
        }).join('');
        return section('News Flow', 'What’s Moving Today', '', `<div class="story-grid">${cards}</div>`, 'section-news');
      }

      function renderCrypto(data) {
        const c = asObj(data.crypto);
        const sentiment = cryptoSentimentRow(data);
        const totalStat = cryptoTotalStatRow(data);
        // Crypto stat graphics are derived only from embedded daily JSON; there are no runtime sidecar fetches.
        const dominance = asObj(c.dominance);
        const dominanceValue = (key) => String(dominance[key] || '').trim();
        const hasDominance = ['btc', 'eth', 'others'].every((key) => dominanceValue(key));
        const rows = cryptoTapeRows(data).map((row) => {
          const rowTone = tone(row.dir);
          const sub = row.sub || row.sym || row.ticker || '';
          const change = `<div class="metric-pair"><div class="metric-value ${rowTone}">${esc(cryptoDelta(row, data))}</div><div class="metric-sep">/</div><div class="metric-value ${rowTone}">${esc(row.chg)}</div></div>`;
          return `
            <div class="quote-row crypto-row">
              <div class="name entity-name">${esc(row.name)}<span class="entity-sub">${esc(sub)}</span></div>
              <div class="crypto-quote quote-readout">
                <div class="price metric-primary">${esc(row.price)}</div>
                ${change}
              </div>
            </div>
          `;
        }).join('');
        const dominanceHtml = hasDominance
          ? `
            <div class="dominance-module">
              <div class="dominance-labels">
                <div class="dominance-label">
                  <span class="dominance-name"><span class="dominance-dot btc"></span>Bitcoin</span>
                  <span class="dominance-value">${esc(dominanceValue('btc'))}</span>
                </div>
                <div class="dominance-label">
                  <span class="dominance-name"><span class="dominance-dot eth"></span>Ethereum</span>
                  <span class="dominance-value">${esc(dominanceValue('eth'))}</span>
                </div>
                <div class="dominance-label">
                  <span class="dominance-name"><span class="dominance-dot others"></span>Others</span>
                  <span class="dominance-value">${esc(dominanceValue('others'))}</span>
                </div>
              </div>
              <div class="dominance-bar" aria-label="Crypto market cap dominance">
                <span class="dominance-segment btc" style="width: ${esc(dominanceValue('btc'))}"></span>
                <span class="dominance-segment eth" style="width: ${esc(dominanceValue('eth'))}"></span>
                <span class="dominance-segment others" style="width: ${esc(dominanceValue('others'))}"></span>
              </div>
            </div>
          `
          : '';
        const sentimentScore = numericValue(sentiment?.price);
        const sentimentLabel = sentiment?.sub || '';
        const hasSentimentGauge = Number.isFinite(sentimentScore);
        const gaugeScore = Math.max(0, Math.min(100, sentimentScore || 0));
        const sentimentGaugeHtml = hasSentimentGauge
          ? `
            <div class="fear-greed-gauge" aria-label="Crypto Fear and Greed score ${esc(sentiment.price)}">
              <div class="fear-greed-arc"></div>
              <div class="fear-greed-pointer" style="--pointer-angle: ${Math.max(-180, Math.min(0, -180 + (gaugeScore * 1.8)))}deg"></div>
              <div class="fear-greed-center">
                <div class="fear-greed-score">${esc(sentiment.price)}</div>
                ${sentimentLabel ? `<div class="fear-greed-label">${esc(sentimentLabel)}</div>` : ''}
              </div>
            </div>
          `
          : '';
        const cryptoStatCard = (stat, label) => {
          if (!stat) return '';
          const change = stat.delta || stat.chg || '';
          const isSentiment = isCryptoSentimentRow(stat);
          const isTotal = isCryptoTotalRow(stat);
          const trendValue = numericValue(change);
          const sentimentTrend = Number.isFinite(trendValue)
            ? trendValue > 0 ? 'Improving' : trendValue < 0 ? 'Deteriorating' : 'Unchanged'
            : stat.sub;
          const subText = isSentiment ? sentimentTrend : stat.sub;
          const valuesHtml = isSentiment
            ? sentimentGaugeHtml
            : `
                <strong class="metric-primary">${esc(stat.price)}</strong>
                ${change ? `<span class="metric-value ${tone(stat.dir)}">${esc(change)}</span>` : ''}
              `;
          const extra = isTotal ? dominanceHtml : '';
          return `
          <div class="crypto-stat surface card${isSentiment ? ' sentiment-stat' : ''}">
            <div class="tag crypto">${esc(label)}</div>
            <div class="crypto-stat-line">
              <div class="crypto-stat-copy">
                <h3 class="entity-name">${esc(stat.name)}</h3>
                <p class="entity-sub">${esc(subText)}</p>
              </div>
              <div class="crypto-stat-values">
                ${valuesHtml}
              </div>
            </div>
            ${extra}
          </div>
        `;
        };
        const statsHtml = [cryptoStatCard(totalStat, 'Market Cap'), cryptoStatCard(sentiment, 'Sentiment')].join('');
        const notes = asArr(c.notes).map((note) => {
          const url = safeUrl(note.url);
          return `
            <article class="crypto-note editorial-card surface card">
              <div class="tag crypto">${esc(note.kicker)}</div>
              <h3>${esc(note.title)}</h3>
              <p>${inline(note.body)}</p>
              ${url ? `<a class="story-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">Read more</a>` : ''}
            </article>
          `;
        }).join('');
        return section('Digital Assets', 'Crypto', '', `
          <div class="story-grid crypto-grid">
            <div class="crypto-left">
              ${statsHtml}
              <div class="crypto-tape surface surface-shadow surface-clip">
                ${rows}
              </div>
            </div>
            <div class="crypto-notes">
              ${notes}
            </div>
          </div>
        `, 'section-crypto');
      }

      function earningsMoveClass(tile) {
        const role = String(tile.moveRole || tile.moveType || '').trim().toLowerCase();
        const text = String(tile.move || '').trim();
        const moveTone = tone(tile.moveDir);
        const hasDirectionalTone = moveTone === 'up' || moveTone === 'down';
        const isPending = /\b(consensus|estimate|estimated|expected|expects|seen|preview|pending)\b/i.test(text);
        const isMarketReaction = /\b(stock|shares|premarket|pre-market|after[-\s]?hours|market reaction|price reaction)\b/i.test(text);
        const isLabeledSurprise = /\b(beat|miss|surprise)\b/i.test(text);

        if (/(pending|consensus|estimate|preview)/.test(role)) return 'flat';
        if (/(reported|fundamental|guidance)/.test(role)) return '';
        if (/(market|reaction|price|stock|shares)/.test(role)) return moveTone;
        if (/surprise/.test(role)) return isLabeledSurprise && hasDirectionalTone ? moveTone : '';
        if (isPending) return 'flat';
        if ((isMarketReaction || isLabeledSurprise) && hasDirectionalTone) return moveTone;
        return '';
      }

      function renderEarnings(data) {
        const cards = asArr(data.earnings?.tiles).map((tile) => `
          <article class="earn editorial-card surface card">
            <div class="tag ${tone(tile.tone)}">${esc(tile.co)}</div>
            <h3 class="${earningsMoveClass(tile)}">${esc(tile.move)}</h3>
            <p>${esc(tile.body)}</p>
          </article>
        `).join('');
        return section('Single Stocks', 'Earnings', '', `<div class="earnings-grid">${cards}</div>`, 'section-earnings');
      }

      function renderWeekAhead(data) {
        const rows = asArr(data.weekAhead?.rows).map((row) => `
          <div class="week-row">
            <div class="week-day">${esc(row.day)}</div>
            <div class="week-event">${inline(row.event)}</div>
            <div class="week-tickers">${esc(row.tickers)}</div>
          </div>
        `).join('');
        return section('Calendar', 'The Week Ahead', '', `<div class="week surface surface-shadow">${rows}</div>`, 'section-week-ahead');
      }

      function compactCompiledText(data) {
        const raw = String(data.footer?.compiled || '');
        const disclaimer = String(data.footer?.disclaimer || 'Not investment advice').trim();
        if (!raw) return disclaimer;
        if (raw.toLowerCase().includes(disclaimer.toLowerCase())) return raw;
        const compiled = raw.replace(/[.\s]+$/, '');
        return `${compiled} · ${disclaimer}`;
      }

      function renderFooter(data) {
        $('footer').innerHTML = `
          <div>${esc(compactCompiledText(data))}</div>
        `;
      }

      function closeDividendTooltips(except = null) {
        document.querySelectorAll('.div-info.is-open').forEach((wrap) => {
          if (wrap === except) return;
          wrap.classList.remove('is-open');
          wrap.querySelector('[data-dividend-button]')?.setAttribute('aria-expanded', 'false');
        });
      }

      function routeDividendTooltipClick(event) {
        const wrap = event.target.closest?.('[data-dividend-info]');
        const button = event.target.closest?.('[data-dividend-button]');
        if (!wrap) {
          closeDividendTooltips();
          return;
        }
        if (!button) return;
        const shouldOpen = !wrap.classList.contains('is-open');
        closeDividendTooltips(wrap);
        wrap.classList.toggle('is-open', shouldOpen);
        button.setAttribute('aria-expanded', String(shouldOpen));
        if (!shouldOpen) button.blur?.();
      }

      function closeDividendTooltipsOnEscape(event) {
        if (event.key !== 'Escape') return;
        closeDividendTooltips();
        event.target.closest?.('[data-dividend-button]')?.blur?.();
      }

      function render(data) {
        renderHero(data);
        $('content').innerHTML = [
          renderPreMarket(data),
          renderTape(data),
          renderPortfolioUniverse(data),
          renderStories(data),
          renderCrypto(data),
          renderEarnings(data),
          renderWeekAhead(data)
        ].join('');
        renderFooter(data);
      }

      function loadData() {
        // Production is intentionally self-contained so daily updates can edit only the embedded JSON block.
        const node = document.getElementById('dashboard-data');
        if (!node) throw new Error('The dashboard-data JSON block was not found.');
        return JSON.parse(node.textContent || '{}');
      }

      document.addEventListener('click', routeDividendTooltipClick);
      document.addEventListener('keydown', closeDividendTooltipsOnEscape);

      try {
        render(loadData());
      } catch (error) {
        $('hero-headline').textContent = 'Could not load today’s dashboard data.';
        $('hero-copy').textContent = 'The embedded dashboard-data JSON block could not be parsed.';
        $('content').innerHTML = `<div class="error">${esc(error.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
