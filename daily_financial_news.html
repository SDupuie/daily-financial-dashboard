<style>
  :root {
    --bg: #0e0d0a; --panel: #15130f; --panel-2: #1c1a14;
    --ink: #efe7d6; --ink-dim: #a39681; --rule: #2a2620;
    --amber: #e8a838; --amber-bright: #ffc857;
    --green: #6db674; --red: #d96c5c; --accent: #c9b07a;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --font-serif: 'Fraunces', Georgia, 'Times New Roman', serif;
    --font-mono: 'JetBrains Mono', 'SFMono-Regular', Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--font-sans); line-height: 1.55; }
  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(232,168,56,0.06), transparent 40%),
      radial-gradient(ellipse at bottom right, rgba(201,176,122,0.04), transparent 50%);
    min-height: 100vh; padding: 40px 24px 80px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }
  .mast { border-top: 3px double var(--ink); border-bottom: 1px solid var(--rule); padding: 18px 0 14px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 24px; }
  .mast-meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); }
  .mast-meta.right { text-align: right; }
  .mast h1 { font-family: var(--font-serif); font-weight: 800; font-size: clamp(34px, 5vw, 52px); letter-spacing: -0.02em; text-align: center; line-height: 1; }
  .mast h1 em { font-style: italic; color: var(--amber); font-weight: 400; }
  .subhead { text-align: center; margin-top: 14px; padding-bottom: 28px; border-bottom: 1px solid var(--rule); font-family: var(--font-serif); font-style: italic; color: var(--ink-dim); font-size: 15px; }
  section { margin-top: 44px; }
  .sec-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.25em; color: var(--amber); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .sec-label::before { content: ''; width: 24px; height: 1px; background: var(--amber); }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .sec-title { font-family: var(--font-serif); font-size: 28px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 22px; }
  .tape { background: var(--panel); border: 1px solid var(--rule); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  .tape table { table-layout: fixed; }
  .tape th:nth-child(1), .tape td:nth-child(1) { width: 18%; }
  .tape th:nth-child(2), .tape td:nth-child(2) { width: 13%; }
  .tape th:nth-child(3), .tape td:nth-child(3) { width: 11%; }
  .tape th:nth-child(4), .tape td:nth-child(4) { width: 8%; }
  .tape th:nth-child(5), .tape td:nth-child(5) { width: 50%; }
  .tape th, .tape td { padding: 12px 16px; text-align: right; font-family: var(--font-mono); font-size: 13px; border-bottom: 1px solid var(--rule); vertical-align: top; }
  .tape th { background: var(--panel-2); color: var(--ink-dim); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; text-align: right; }
  .tape th:first-child, .tape td:first-child { text-align: left; }
  .tape tr:last-child td { border-bottom: none; }
  .tape .name { font-family: var(--font-serif); font-size: 15px; color: var(--ink); font-weight: 600; letter-spacing: 0; }
  .tape .ticker { font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); margin-left: 8px; }
  .up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--ink-dim); }
  .lede { display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px; margin-top: 16px; }
  .lede-main { border-left: 3px solid var(--amber); padding-left: 24px; }
  .kicker { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber-bright); margin-bottom: 10px; }
  .lede h2 { font-family: var(--font-serif); font-weight: 800; font-size: 36px; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 14px; }
  .lede h2 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .lede p { color: var(--ink); font-size: 16px; margin-bottom: 12px; }
  .lede p:last-child { color: var(--ink-dim); font-size: 14px; }
  .lede-side { display: flex; flex-direction: column; gap: 18px; }
  .side-card { background: var(--panel); border: 1px solid var(--rule); padding: 18px; }
  .side-card .num { font-family: var(--font-serif); font-size: 32px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; margin-bottom: 6px; }
  .side-card .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 10px; }
  .side-card p { font-size: 13px; color: var(--ink-dim); line-height: 1.5; }
  .side-card.amber .num { color: var(--amber-bright); }
  .side-card.green .num { color: var(--green); }
  .side-card.red .num { color: var(--red); }
  .stories { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; border-top: 1px solid var(--rule); }
  .story { padding: 24px 28px 24px 0; border-bottom: 1px solid var(--rule); }
  .story:nth-child(odd) { border-right: 1px solid var(--rule); padding-right: 28px; }
  .story:nth-child(even) { padding-left: 28px; padding-right: 0; }
  .story .tag { display: inline-block; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--bg); background: var(--amber); padding: 3px 8px; margin-bottom: 12px; }
  .story .tag.macro { background: var(--accent); }
  .story .tag.geo { background: var(--red); color: var(--ink); }
  .story .tag.corp { background: var(--green); color: var(--bg); }
  .story .tag.fed { background: var(--amber-bright); }
  .story .tag.crypto { background: #f0a040; color: var(--bg); }
  .story h3 { font-family: var(--font-serif); font-weight: 600; font-size: 22px; line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 10px; }
  .story p { font-size: 14px; color: var(--ink-dim); }
  .story .story-link { display: inline-flex; margin-top: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--amber-bright); text-decoration: none; border-bottom: 1px solid rgba(232,168,56,0.55); }
  .story .story-link:hover { color: var(--ink); border-bottom-color: var(--ink); }
  .story .pull { font-family: var(--font-serif); font-style: italic; font-size: 15px; color: var(--accent); border-top: 1px solid var(--rule); margin-top: 12px; padding-top: 10px; }
  .renesas-wrap { background: linear-gradient(135deg, var(--panel) 0%, rgba(40,30,15,0.6) 100%); border: 1px solid var(--rule); border-left: 4px solid #d96c5c; padding: 28px 32px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 32px; align-items: start; }
  .renesas-wrap > * { min-width: 0; }
  .renesas-head { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #d96c5c; margin-bottom: 8px; }
  .renesas-wrap h3 { font-family: var(--font-serif); font-weight: 700; font-size: 26px; line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 14px; }
  .renesas-wrap h3 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .renesas-wrap p { font-size: 14.5px; color: var(--ink); margin-bottom: 10px; }
  .renesas-wrap p:last-of-type { color: var(--ink-dim); font-size: 13.5px; }
  .renesas-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .rstat { background: rgba(0,0,0,0.25); border: 1px solid var(--rule); padding: 12px 14px; min-width: 0; }
  .rstat .rk { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 6px; }
  .rstat .rv { font-family: var(--font-serif); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; line-height: 1; margin-bottom: 4px; }
  .rstat .rv.up { color: var(--green); }
  .rstat .rv.down { color: var(--red); }
  .rstat .rv.amber { color: var(--amber-bright); }
  .rstat small { font-size: 11px; color: var(--ink-dim); font-family: var(--font-sans); }
  .crypto-wrap { display: grid; grid-template-columns: 1.1fr 1fr; gap: 28px; align-items: start; }
  .crypto-tape { background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%); border: 1px solid var(--rule); position: relative; overflow: hidden; }
  .crypto-tape::before { content: '24/7'; position: absolute; top: 12px; right: 16px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; color: var(--amber); background: rgba(232,168,56,0.1); padding: 3px 8px; border: 1px solid rgba(232,168,56,0.3); }
  .crypto-tape h4 { font-family: var(--font-serif); font-style: italic; font-size: 14px; color: var(--ink-dim); padding: 14px 20px 10px; border-bottom: 1px solid var(--rule); font-weight: 400; }
  .crypto-row { display: grid; grid-template-columns: 56px 1fr auto auto; gap: 14px; padding: 12px 20px; align-items: baseline; border-bottom: 1px solid var(--rule); }
  .crypto-row:last-child { border-bottom: none; }
  .crypto-sym { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; color: var(--amber); font-weight: 700; }
  .crypto-name { font-family: var(--font-serif); font-size: 15px; color: var(--ink); }
  .crypto-name span { display: block; font-family: var(--font-sans); font-size: 11px; color: var(--ink-dim); margin-top: 2px; }
  .crypto-price { font-family: var(--font-mono); font-size: 15px; text-align: right; color: var(--ink); }
  .crypto-chg { font-family: var(--font-mono); font-size: 13px; text-align: right; min-width: 64px; }
  .crypto-notes { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .cnote { background: var(--panel); border: 1px solid var(--rule); border-left: 3px solid #f0a040; padding: 14px 18px; }
  .cnote .ckicker { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: #f0a040; margin-bottom: 6px; }
  .cnote h4 { font-family: var(--font-serif); font-size: 17px; font-weight: 600; margin-bottom: 6px; line-height: 1.2; }
  .cnote p { font-size: 13px; color: var(--ink-dim); line-height: 1.5; }
  .cnote .story-link { display: inline-flex; margin-top: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--amber-bright); text-decoration: none; border-bottom: 1px solid rgba(232,168,56,0.55); }
  .cnote .story-link:hover { color: var(--ink); border-bottom-color: var(--ink); }
  .earnings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .ern { background: var(--panel); border: 1px solid var(--rule); padding: 16px 18px; position: relative; }
  .ern.win { border-left: 3px solid var(--green); }
  .ern.loss { border-left: 3px solid var(--red); }
  .ern.mix { border-left: 3px solid var(--amber); }
  .ern .co { font-family: var(--font-serif); font-weight: 700; font-size: 17px; margin-bottom: 2px; }
  .ern .move { font-family: var(--font-mono); font-size: 12px; margin-bottom: 8px; }
  .ern p { font-size: 13px; color: var(--ink-dim); line-height: 1.45; }
  .ahead { background: var(--panel); border: 1px solid var(--rule); }
  .ahead-row { display: grid; grid-template-columns: 110px 1fr 200px; gap: 24px; padding: 16px 24px; border-bottom: 1px solid var(--rule); align-items: baseline; }
  .ahead-row:last-child { border-bottom: none; }
  .ahead-day { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--amber); }
  .ahead-event { font-family: var(--font-serif); font-size: 16px; }
  .ahead-event strong { font-weight: 600; }
  .ahead-tickers { font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); text-align: right; letter-spacing: 0.05em; }
  .runtime-banner {
    margin-top: 16px;
    border: 1px solid rgba(217,108,92,0.6);
    border-left: 3px solid var(--red);
    background: rgba(217,108,92,0.12);
    color: var(--ink);
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.04em;
  }
  footer { margin-top: 60px; padding-top: 24px; border-top: 3px double var(--ink); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-dim); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  @media (max-width: 820px) {
    .lede, .stories, .earnings-grid { grid-template-columns: 1fr; }
    .story, .story:nth-child(odd), .story:nth-child(even) { border-right: none; padding: 24px 0; }
    .crypto-wrap { grid-template-columns: 1fr; }
    .renesas-wrap { grid-template-columns: 1fr; padding: 22px; }
    .ahead-row { grid-template-columns: 90px 1fr; }
    .ahead-tickers { grid-column: 1 / -1; text-align: left; padding-left: 114px; }
    .mast { grid-template-columns: 1fr; text-align: center; }
    .mast-meta.right { text-align: center; }
    .tape { overflow-x: auto; }
  }
  @media (max-width: 640px) {
    body { padding: 24px 14px 64px; }
    section { margin-top: 36px; }
    .sec-label { align-items: flex-start; font-size: 9px; letter-spacing: 0.18em; line-height: 1.5; }
    .sec-label::before { margin-top: 0.7em; }
    .sec-label::after { margin-top: 0.7em; }
    .tape { overflow: hidden; }
    .tape table, .tape tbody, .tape tr, .tape td { display: block; width: 100%; }
    .tape th:nth-child(1), .tape td:nth-child(1),
    .tape th:nth-child(2), .tape td:nth-child(2),
    .tape th:nth-child(3), .tape td:nth-child(3),
    .tape th:nth-child(4), .tape td:nth-child(4),
    .tape th:nth-child(5), .tape td:nth-child(5) { width: auto; }
    .tape thead { display: none; }
    .tape tr {
      display: grid;
      grid-template-columns: minmax(98px, 1fr) minmax(72px, 0.7fr) minmax(72px, 0.7fr);
      gap: 10px 8px;
      padding: 15px 14px 16px;
      border-bottom: 1px solid var(--rule);
    }
    .tape tr:last-child { border-bottom: none; }
    .tape tr:last-child td { border-bottom: none; }
    .tape th, .tape td { padding: 0; border-bottom: none; text-align: left; min-width: 0; }
    .tape td:first-child {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 3px 8px;
    }
    .tape .name { font-size: 18px; line-height: 1.15; }
    .tape .ticker { margin-left: 0; font-size: 10px; }
    .tape td:nth-child(2), .tape td:nth-child(3), .tape td:nth-child(4) {
      border: 1px solid var(--rule);
      background: rgba(0,0,0,0.14);
      padding: 8px 9px;
      min-height: 52px;
      overflow-wrap: anywhere;
    }
    .tape td:nth-child(2)::before, .tape td:nth-child(3)::before, .tape td:nth-child(4)::before {
      content: attr(data-label);
      display: block;
      margin-bottom: 2px;
      color: var(--ink-dim);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .tape td:nth-child(5) {
      grid-column: 1 / -1;
      color: var(--ink-dim);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.45;
      padding-top: 2px;
    }
    .crypto-tape h4 { padding-right: 76px; }
    .crypto-row {
      grid-template-columns: 44px minmax(0, 1fr) auto auto;
      gap: 4px 8px;
      padding: 13px 14px;
      align-items: baseline;
    }
    .crypto-name { min-width: 0; line-height: 1.2; }
    .crypto-name span { line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .crypto-price { grid-column: 3; grid-row: 1; text-align: right; }
    .crypto-chg { grid-column: 4; grid-row: 1; text-align: right; min-width: 0; white-space: nowrap; }
    .ahead-row { grid-template-columns: 1fr; gap: 6px; padding: 16px 18px; }
    .ahead-tickers { grid-column: auto; padding-left: 0; }
  }
</style>
</head>
