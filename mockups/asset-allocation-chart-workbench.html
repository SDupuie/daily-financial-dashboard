<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asset Allocation Chart Workbench Mockup</title>
  <style>
    :root {
      --paper: #f7f8fa;
      --ink: #111317;
      --muted: #626a75;
      --line: #d9dee7;
      --panel: #ffffff;
      --blue: #2457ff;
      --cyan: #087ea4;
      --green: #18885b;
      --red: #d64f45;
      --gold: #a06b00;
      --violet: #6b5bbd;
      --shadow: 0 14px 34px rgba(16, 24, 40, 0.08);
      --radius: 8px;
      --gap-sm: 10px;
      --gap-md: 14px;
      --gap-lg: 18px;
      --label-size: 10px;
      --label-weight: 900;
      --label-spacing: 0.14em;
    }

    * { box-sizing: border-box; }

    html {
      background: var(--paper);
      color: var(--ink);
    }

    body {
      margin: 0;
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1220px, calc(100% - 40px));
      margin: 0 auto;
      padding: 26px 0 52px;
    }

    .topline {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--gap-lg);
      align-items: center;
      border-top: 5px solid var(--ink);
      border-bottom: 1px solid var(--line);
      padding: 16px 0;
    }

    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(31px, 5vw, 60px);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.96;
    }

    .mockup-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .mockup-nav a {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      background: var(--panel);
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .mockup-nav a.current {
      border-color: rgba(36, 87, 255, 0.32);
      background: #edf2ff;
      color: var(--blue);
    }

    .section {
      margin-top: 34px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: var(--gap-lg);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .section-label,
    .mini-label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
    }

    .section-label {
      margin-bottom: 5px;
    }

    .section-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: 0;
      line-height: 1;
    }

    .portfolio-total-return {
      display: grid;
      justify-items: end;
      gap: 2px;
      text-align: right;
      white-space: nowrap;
    }

    .portfolio-total-value {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 23px;
      font-weight: 900;
      line-height: 1.05;
    }

    .portfolio-total-label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      line-height: 1.2;
      text-transform: uppercase;
    }

    .workbench {
      display: grid;
      grid-template-columns: minmax(220px, 0.34fr) minmax(0, 1fr);
      gap: var(--gap-md);
      align-items: stretch;
    }

    .selector {
      display: grid;
      align-content: start;
      gap: 8px;
      border-right: 1px solid var(--line);
      padding-right: var(--gap-md);
    }

    .ticker-toggle {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 10px;
      background: #ffffff;
      cursor: pointer;
    }

    .ticker-toggle:has(input:checked) {
      border-color: rgba(36, 87, 255, 0.34);
      background: #fbfcff;
    }

    .ticker-toggle input {
      width: 17px;
      height: 17px;
      accent-color: var(--blue);
    }

    .toggle-copy {
      min-width: 0;
    }

    .toggle-title {
      display: block;
      overflow: hidden;
      font-size: 13px;
      font-weight: 850;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toggle-ticker {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
      font-weight: 850;
    }

    .toggle-dot {
      width: 10px;
      height: 32px;
      border-radius: 999px;
      background: var(--blue);
    }

    .chart-panel {
      display: grid;
      grid-template-rows: auto minmax(320px, 1fr) auto;
      gap: var(--gap-md);
      min-width: 0;
    }

    .chart-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--gap-md);
      align-items: center;
    }

    .chart-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .chart-title strong {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 25px;
      letter-spacing: 0;
      line-height: 1;
    }

    .chart-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .range-control {
      display: inline-flex;
      justify-self: end;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      padding: 3px;
    }

    .range-control button {
      min-width: 42px;
      min-height: 28px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .range-control button[aria-pressed="true"] {
      background: var(--ink);
      color: #ffffff;
    }

    .comparison-chart {
      width: 100%;
      height: 100%;
      min-height: 330px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .legend-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      min-height: 32px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1f2937;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      font-weight: 850;
    }

    .legend-line {
      width: 22px;
      height: 3px;
      border-radius: 999px;
      background: var(--blue);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 8px;
      margin-top: var(--gap-md);
    }

    .stat {
      display: grid;
      gap: 2px;
      border-top: 3px solid var(--line);
      padding-top: 7px;
    }

    .stat strong {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 15px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .source-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    @media (max-width: 820px) {
      .workbench {
        grid-template-columns: 1fr;
      }

      .selector {
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 0 0 var(--gap-md);
      }
    }

    @media (max-width: 620px) {
      .page {
        width: min(100% - 24px, 1220px);
        padding-top: 14px;
      }

      .topline,
      .section-head,
      .chart-toolbar {
        display: grid;
        grid-template-columns: 1fr;
      }

      .mockup-nav {
        justify-content: flex-start;
      }

      .portfolio-total-return {
        justify-items: start;
        text-align: left;
      }

      .section {
        padding: 12px;
      }

      .range-control {
        justify-self: start;
        max-width: 100%;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topline">
      <div class="brand">Daily Financial Dashboard</div>
      <nav class="mockup-nav" aria-label="Asset allocation chart mockups">
        <a href="asset-allocation-compact-chart-cards.html">Compact</a>
        <a href="asset-allocation-expanded-row-charts.html">Expanded Rows</a>
        <a class="current" href="asset-allocation-chart-workbench.html">Workbench</a>
      </nav>
    </header>

    <section class="section portfolio-section" aria-labelledby="portfolio-title">
      <div class="section-head">
        <div>
          <div class="section-label">Portfolio</div>
          <h1 class="section-title" id="portfolio-title">Asset Allocation</h1>
        </div>
        <div class="portfolio-total-return">
          <span class="portfolio-total-value">+0.00%</span>
          <span class="portfolio-total-label">Portfolio MTD</span>
        </div>
      </div>

      <div class="workbench">
        <fieldset class="selector" id="selector" aria-label="Ticker selection"></fieldset>
        <div class="chart-panel">
          <div class="chart-toolbar">
            <div class="chart-title">
              <strong>Indexed Ticker Comparison</strong>
              <span id="chart-subtitle"></span>
            </div>
            <div class="range-control" aria-label="Chart range" id="range-control">
              <button type="button" data-range="90">3M</button>
              <button type="button" data-range="180">6M</button>
              <button type="button" data-range="365" aria-pressed="true">1Y</button>
            </div>
          </div>
          <svg class="comparison-chart" id="comparison-chart" viewBox="0 0 820 430" role="img" aria-label="Indexed ETF comparison chart"></svg>
          <div class="legend-strip" id="legend-strip"></div>
        </div>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <p class="source-note">Mockup-only normalized sample paths for ticker chart layout exploration; no tactical weights or allocation calculations are shown.</p>
    </section>
  </main>

  <script>
    const assets = [
      { ticker: 'VTI', title: 'U.S. Total Market', swatch: '#2457ff', checked: true, start: 100, drift: 0.18, wave: 5.2 },
      { ticker: 'VEA', title: 'Developed ex-U.S.', swatch: '#087ea4', checked: true, start: 76, drift: 0.12, wave: 4.1 },
      { ticker: 'VWO', title: 'Emerging Markets', swatch: '#18885b', checked: true, start: 62, drift: 0.15, wave: 6.4 },
      { ticker: 'VNQ', title: 'U.S. Real Estate', swatch: '#a06b00', checked: false, start: 88, drift: -0.02, wave: 5.8 },
      { ticker: 'DBC', title: 'Commodities', swatch: '#d64f45', checked: false, start: 37, drift: 0.04, wave: 7.2 },
      { ticker: 'GLD', title: 'Gold', swatch: '#c48a05', checked: true, start: 118, drift: 0.23, wave: 5 },
      { ticker: 'IEF', title: '7-10Y Treasuries', swatch: '#6b5bbd', checked: true, start: 98, drift: -0.01, wave: 2.7 },
      { ticker: 'BOXX', title: 'T-Bill Alternative', swatch: '#475569', checked: false, start: 112, drift: 0.035, wave: 0.8 }
    ];

    let activeRange = 365;

    function series(asset, points = 365) {
      return Array.from({ length: points }, (_, index) => {
        const seasonal = Math.sin(index / 15 + asset.start / 17) * asset.wave;
        const shorter = Math.cos(index / 7 + asset.wave) * asset.wave * 0.28;
        return Math.max(1, asset.start + index * asset.drift + seasonal + shorter);
      });
    }

    function selectedAssets() {
      return assets.filter((asset) => asset.checked);
    }

    function normalized(asset) {
      const values = series(asset).slice(-activeRange);
      const base = values[0] || 1;
      return values.map((value) => value / base * 100);
    }

    function pathFor(values, domain, width = 820, height = 430) {
      const [min, max] = domain;
      const span = max - min || 1;
      const left = 42;
      const right = width - 24;
      const top = 28;
      const bottom = height - 54;
      return values.map((value, index) => {
        const x = left + (index / Math.max(values.length - 1, 1)) * (right - left);
        const y = top + (1 - (value - min) / span) * (bottom - top);
        return `${index ? 'L' : 'M'}${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(' ');
    }

    function renderSelector() {
      document.getElementById('selector').innerHTML = assets.map((asset) => `
        <label class="ticker-toggle">
          <input type="checkbox" data-ticker="${asset.ticker}" ${asset.checked ? 'checked' : ''}>
          <span class="toggle-copy">
            <span class="toggle-title">${asset.title}</span>
            <span class="toggle-ticker">${asset.ticker}</span>
          </span>
          <span class="toggle-dot" style="background: ${asset.swatch}"></span>
        </label>
      `).join('');
    }

    function renderChart() {
      const chosen = selectedAssets();
      const allValues = chosen.flatMap((asset) => normalized(asset));
      const min = Math.min(92, ...allValues);
      const max = Math.max(108, ...allValues);
      const pad = (max - min) * 0.08;
      const domain = [min - pad, max + pad];
      const lines = chosen.map((asset) => {
        const values = normalized(asset);
        return `<path d="${pathFor(values, domain)}" fill="none" stroke="${asset.swatch}" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5"></path>`;
      }).join('');
      document.getElementById('comparison-chart').innerHTML = `
        <g stroke="#d9dee7" stroke-width="1">
          <path d="M42 62 H796"></path>
          <path d="M42 148 H796"></path>
          <path d="M42 234 H796"></path>
          <path d="M42 320 H796"></path>
          <path d="M42 376 H796"></path>
        </g>
        <path d="M42 214 H796" stroke="#111317" stroke-width="1.2" stroke-dasharray="5 6" opacity="0.45"></path>
        ${lines}
        <text x="42" y="412" fill="#626a75" font-size="12" font-weight="800">Indexed to 100 at range start</text>
        <text x="796" y="412" fill="#111317" font-size="12" font-weight="900" text-anchor="end">${activeRange === 365 ? '1Y' : `${Math.round(activeRange / 30)}M`}</text>
      `;
      document.getElementById('chart-subtitle').textContent = `${chosen.length} selected ticker${chosen.length === 1 ? '' : 's'} · sample normalized price paths`;
      document.getElementById('legend-strip').innerHTML = chosen.map((asset) => `
        <span class="legend-item"><span class="legend-line" style="background: ${asset.swatch}"></span>${asset.ticker}</span>
      `).join('');
      renderStats(chosen);
    }

    function renderStats(chosen) {
      const ranked = chosen.map((asset) => {
        const values = normalized(asset);
        const ret = values.at(-1) - 100;
        const swings = values.slice(1).map((value, index) => Math.abs(value - values[index]));
        const avgSwing = swings.reduce((sum, value) => sum + value, 0) / swings.length;
        return { ...asset, ret, avgSwing };
      }).sort((a, b) => b.ret - a.ret);
      const leader = ranked[0];
      const laggard = ranked.at(-1);
      const calmest = [...ranked].sort((a, b) => a.avgSwing - b.avgSwing)[0];
      document.getElementById('stats-grid').innerHTML = [
        ['Leader', leader ? `${leader.ticker} ${leader.ret >= 0 ? '+' : ''}${leader.ret.toFixed(1)}%` : '-'],
        ['Laggard', laggard ? `${laggard.ticker} ${laggard.ret >= 0 ? '+' : ''}${laggard.ret.toFixed(1)}%` : '-'],
        ['Lowest Path Noise', calmest ? `${calmest.ticker} ${calmest.avgSwing.toFixed(2)}` : '-'],
        ['Selected', String(chosen.length)]
      ].map(([label, value]) => `<div class="stat"><strong>${value}</strong><span>${label}</span></div>`).join('');
    }

    document.getElementById('selector').addEventListener('change', (event) => {
      const input = event.target.closest('[data-ticker]');
      if (!input) return;
      const asset = assets.find((item) => item.ticker === input.dataset.ticker);
      asset.checked = input.checked;
      if (!selectedAssets().length) {
        asset.checked = true;
        input.checked = true;
      }
      renderChart();
    });

    document.getElementById('range-control').addEventListener('click', (event) => {
      const button = event.target.closest('[data-range]');
      if (!button) return;
      activeRange = Number(button.dataset.range);
      document.querySelectorAll('[data-range]').forEach((node) => {
        node.setAttribute('aria-pressed', String(node === button));
      });
      renderChart();
    });

    renderSelector();
    renderChart();
  </script>
</body>
</html>
