<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asset Allocation Expanded Row Charts Mockup</title>
  <style>
    :root {
      --paper: #f7f8fa;
      --ink: #111317;
      --muted: #626a75;
      --line: #d9dee7;
      --panel: #ffffff;
      --blue: #2457ff;
      --cyan: #087ea4;
      --green: #18885b;
      --red: #d64f45;
      --gold: #a06b00;
      --violet: #6b5bbd;
      --shadow: 0 14px 34px rgba(16, 24, 40, 0.08);
      --radius: 8px;
      --gap-sm: 10px;
      --gap-md: 14px;
      --gap-lg: 18px;
      --label-size: 10px;
      --label-weight: 900;
      --label-spacing: 0.14em;
    }

    * { box-sizing: border-box; }

    html {
      background: var(--paper);
      color: var(--ink);
    }

    body {
      margin: 0;
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    summary {
      list-style: none;
      cursor: pointer;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .page {
      width: min(1220px, calc(100% - 40px));
      margin: 0 auto;
      padding: 26px 0 52px;
    }

    .topline {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--gap-lg);
      align-items: center;
      border-top: 5px solid var(--ink);
      border-bottom: 1px solid var(--line);
      padding: 16px 0;
    }

    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(31px, 5vw, 60px);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.96;
    }

    .mockup-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .mockup-nav a {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      background: var(--panel);
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .mockup-nav a.current {
      border-color: rgba(36, 87, 255, 0.32);
      background: #edf2ff;
      color: var(--blue);
    }

    .section {
      margin-top: 34px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: var(--gap-lg);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .section-label,
    .mini-label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
    }

    .section-label {
      margin-bottom: 5px;
    }

    .section-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: 0;
      line-height: 1;
    }

    .portfolio-total-return {
      display: grid;
      justify-items: end;
      gap: 2px;
      text-align: right;
      white-space: nowrap;
    }

    .portfolio-total-value {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 23px;
      font-weight: 900;
      line-height: 1.05;
    }

    .portfolio-total-label {
      color: var(--blue);
      font-size: var(--label-size);
      font-weight: var(--label-weight);
      letter-spacing: var(--label-spacing);
      line-height: 1.2;
      text-transform: uppercase;
    }

    .row-list {
      display: grid;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .ticker-row {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .ticker-row:last-child {
      border-bottom: 0;
    }

    .ticker-row[open] {
      background: #fbfcff;
    }

    .row-summary {
      display: grid;
      grid-template-columns: auto minmax(170px, 1fr) minmax(160px, 0.75fr) minmax(130px, auto) 28px;
      gap: var(--gap-md);
      align-items: center;
      min-height: 76px;
      padding: 12px 14px;
    }

    .swatch {
      width: 9px;
      height: 44px;
      border-radius: 999px;
      background: var(--blue);
    }

    .asset-main {
      min-width: 0;
    }

    .asset-title {
      font-size: 14px;
      font-weight: 850;
      line-height: 1.15;
    }

    .asset-ticker {
      display: inline-flex;
      margin-top: 6px;
      color: #1f2937;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.02em;
    }

    .row-sparkline {
      width: 100%;
      height: 42px;
      overflow: visible;
    }

    .asset-metrics {
      display: grid;
      gap: 7px;
      justify-items: end;
      text-align: right;
      white-space: nowrap;
    }

    .metric-pair {
      display: inline-flex;
      justify-content: flex-end;
      gap: 6px;
      width: 100%;
      white-space: nowrap;
    }

    .metric-value,
    .metric-sep {
      font-size: 17px;
      font-weight: 850;
    }

    .metric-sep {
      color: var(--muted);
    }

    .metric-value.up { color: var(--green); }
    .metric-value.down { color: var(--red); }
    .metric-value.flat { color: var(--muted); }

    .asset-price {
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.05;
    }

    .expand-mark {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--blue);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 18px;
      font-weight: 900;
    }

    .ticker-row[open] .expand-mark {
      background: var(--ink);
      color: #ffffff;
    }

    .ticker-row[open] .expand-mark::before { content: "-"; }
    .ticker-row:not([open]) .expand-mark::before { content: "+"; }

    .chart-drawer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 0.38fr);
      gap: var(--gap-md);
      border-top: 1px solid var(--line);
      padding: 0 14px 14px 37px;
    }

    .candle-chart {
      width: 100%;
      min-height: 250px;
      aspect-ratio: 2.1 / 1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .drawer-readout {
      align-self: stretch;
      display: grid;
      align-content: start;
      gap: 10px;
      border-left: 1px solid var(--line);
      padding-left: var(--gap-md);
    }

    .readout-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .readout-item {
      display: grid;
      gap: 2px;
      border-top: 3px solid var(--line);
      padding-top: 7px;
    }

    .readout-item strong {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 14px;
      line-height: 1.1;
    }

    .readout-item span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .range-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .range-tabs span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      min-width: 40px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .range-tabs .active {
      border-color: var(--ink);
      background: var(--ink);
      color: #ffffff;
    }

    .source-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .vti { background: #2457ff; }
    .vea { background: #087ea4; }
    .vwo { background: #18885b; }
    .vnq { background: #a06b00; }
    .dbc { background: #d64f45; }
    .gld { background: #c48a05; }
    .ief { background: #6b5bbd; }
    .boxx { background: #475569; }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1220px);
        padding-top: 14px;
      }

      .topline,
      .section-head {
        display: grid;
        grid-template-columns: 1fr;
      }

      .mockup-nav {
        justify-content: flex-start;
      }

      .portfolio-total-return {
        justify-items: start;
        text-align: left;
      }

      .section {
        padding: 12px;
      }

      .row-summary {
        grid-template-columns: auto minmax(0, 1fr) auto;
        grid-template-areas:
          "swatch main mark"
          "spark spark spark"
          "metrics metrics metrics";
      }

      .swatch { grid-area: swatch; }
      .asset-main { grid-area: main; }
      .row-sparkline { grid-area: spark; }
      .asset-metrics {
        grid-area: metrics;
        grid-template-columns: minmax(0, 1fr) auto;
        justify-items: start;
        text-align: left;
      }
      .expand-mark { grid-area: mark; }

      .chart-drawer {
        grid-template-columns: 1fr;
        padding-left: 14px;
      }

      .drawer-readout {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: var(--gap-md) 0 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topline">
      <div class="brand">Daily Financial Dashboard</div>
      <nav class="mockup-nav" aria-label="Asset allocation chart mockups">
        <a href="asset-allocation-compact-chart-cards.html">Compact</a>
        <a class="current" href="asset-allocation-expanded-row-charts.html">Expanded Rows</a>
        <a href="asset-allocation-chart-workbench.html">Workbench</a>
      </nav>
    </header>

    <section class="section portfolio-section" aria-labelledby="portfolio-title">
      <div class="section-head">
        <div>
          <div class="section-label">Portfolio</div>
          <h1 class="section-title" id="portfolio-title">Asset Allocation</h1>
        </div>
        <div class="portfolio-total-return">
          <span class="portfolio-total-value">+0.00%</span>
          <span class="portfolio-total-label">Portfolio MTD</span>
        </div>
      </div>
      <div class="row-list" id="row-list"></div>
      <p class="source-note">Mockup-only sample candles for ticker chart layout exploration; no tactical weights or allocation calculations are shown.</p>
    </section>
  </main>

  <script>
    const assets = [
      { ticker: 'VTI', title: 'U.S. Total Market', sleeve: 'U.S. total market equity', swatch: 'vti', price: '$326.44', daily: '-1.14%', mtd: '+0.00%', start: 100, drift: 0.18, wave: 5.2 },
      { ticker: 'VEA', title: 'Developed ex-U.S.', sleeve: 'Developed ex-U.S. equity', swatch: 'vea', price: '$61.40', daily: '-1.01%', mtd: '+0.00%', start: 76, drift: 0.12, wave: 4.1 },
      { ticker: 'VWO', title: 'Emerging Markets', sleeve: 'Emerging markets equity', swatch: 'vwo', price: '$55.98', daily: '-0.44%', mtd: '+0.00%', start: 62, drift: 0.15, wave: 6.4 },
      { ticker: 'VNQ', title: 'U.S. Real Estate', sleeve: 'U.S. real estate', swatch: 'vnq', price: '$86.33', daily: '-1.75%', mtd: '+0.00%', start: 88, drift: -0.02, wave: 5.8 },
      { ticker: 'DBC', title: 'Commodities', sleeve: 'Broad commodities', swatch: 'dbc', price: '$26.66', daily: '+0.38%', mtd: '+0.00%', start: 37, drift: 0.04, wave: 7.2 },
      { ticker: 'GLD', title: 'Gold', sleeve: 'Gold', swatch: 'gld', price: '$368.38', daily: '-0.05%', mtd: '+0.00%', start: 118, drift: 0.23, wave: 5 },
      { ticker: 'IEF', title: '7-10Y Treasuries', sleeve: '7-10Y U.S. Treasuries', swatch: 'ief', price: '$94.57', daily: '-0.52%', mtd: '+0.00%', start: 98, drift: -0.01, wave: 2.7 },
      { ticker: 'BOXX', title: 'T-Bill Alternative', sleeve: 'Cash / T-bill alternative', swatch: 'boxx', price: '$117.09', daily: '-0.02%', mtd: '+0.00%', start: 112, drift: 0.035, wave: 0.8 }
    ];

    function colorFor(asset) {
      return {
        vti: '#2457ff',
        vea: '#087ea4',
        vwo: '#18885b',
        vnq: '#a06b00',
        dbc: '#d64f45',
        gld: '#c48a05',
        ief: '#6b5bbd',
        boxx: '#475569'
      }[asset.swatch];
    }

    function series(asset, points = 180) {
      return Array.from({ length: points }, (_, index) => {
        const seasonal = Math.sin(index / 15 + asset.start / 17) * asset.wave;
        const shorter = Math.cos(index / 7 + asset.wave) * asset.wave * 0.28;
        return Math.max(1, asset.start + index * asset.drift + seasonal + shorter);
      });
    }

    function pathFor(values, width, height, pad = 5) {
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = max - min || 1;
      return values.map((value, index) => {
        const x = pad + (index / Math.max(values.length - 1, 1)) * (width - pad * 2);
        const y = pad + (1 - (value - min) / span) * (height - pad * 2);
        return `${index ? 'L' : 'M'}${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(' ');
    }

    function miniChart(asset) {
      const values = series(asset, 72);
      const stroke = colorFor(asset);
      return `
        <svg class="row-sparkline" viewBox="0 0 210 42" aria-label="${asset.ticker} row chart">
          <path d="${pathFor(values, 210, 42)}" fill="none" stroke="${stroke}" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
        </svg>
      `;
    }

    function candleChart(asset) {
      const values = series(asset, 64);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = max - min || 1;
      const candles = values.slice(-42).map((close, index, all) => {
        const prev = all[index - 1] ?? close * 0.992;
        const open = prev + Math.sin(index + asset.wave) * span * 0.025;
        const high = Math.max(open, close) + span * (0.035 + (index % 4) * 0.004);
        const low = Math.min(open, close) - span * (0.03 + (index % 3) * 0.004);
        return { open, high, low, close };
      });
      const width = 640;
      const height = 310;
      const top = 24;
      const chartHeight = 205;
      const bottom = 268;
      const xStep = (width - 54) / candles.length;
      const y = (value) => top + (1 - (value - min) / span) * chartHeight;
      const bodyWidth = Math.max(5, xStep * 0.48);
      const stroke = colorFor(asset);
      const candleNodes = candles.map((bar, index) => {
        const x = 28 + index * xStep + xStep / 2;
        const up = bar.close >= bar.open;
        const color = up ? '#18885b' : '#d64f45';
        const bodyY = Math.min(y(bar.open), y(bar.close));
        const bodyH = Math.max(3, Math.abs(y(bar.open) - y(bar.close)));
        const volumeH = 16 + ((index * 13 + asset.start) % 45);
        return `
          <path d="M${x.toFixed(1)} ${y(bar.high).toFixed(1)} V${y(bar.low).toFixed(1)}" stroke="${color}" stroke-width="1.4"></path>
          <rect x="${(x - bodyWidth / 2).toFixed(1)}" y="${bodyY.toFixed(1)}" width="${bodyWidth.toFixed(1)}" height="${bodyH.toFixed(1)}" rx="1.5" fill="${color}"></rect>
          <rect x="${(x - bodyWidth / 2).toFixed(1)}" y="${(bottom - volumeH).toFixed(1)}" width="${bodyWidth.toFixed(1)}" height="${volumeH.toFixed(1)}" fill="${stroke}" opacity="0.18"></rect>
        `;
      }).join('');
      return `
        <svg class="candle-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${asset.ticker} expanded candle chart">
          <g stroke="#d9dee7" stroke-width="1">
            <path d="M24 58 H616"></path>
            <path d="M24 122 H616"></path>
            <path d="M24 186 H616"></path>
            <path d="M24 248 H616"></path>
          </g>
          ${candleNodes}
          <text x="28" y="294" fill="#626a75" font-size="12" font-weight="800">Daily sample candles + volume</text>
          <text x="612" y="294" fill="#111317" font-size="12" font-weight="900" text-anchor="end">${asset.ticker}</text>
        </svg>
      `;
    }

    function readout(asset) {
      const values = series(asset, 180);
      const last = values.at(-1);
      const first = values.at(-90);
      const rangeReturn = ((last / first - 1) * 100);
      const high = Math.max(...values.slice(-90));
      const low = Math.min(...values.slice(-90));
      return `
        <div>
          <div class="mini-label">${asset.ticker}</div>
          <div class="asset-title">${asset.sleeve}</div>
        </div>
        <div class="readout-grid">
          <div class="readout-item"><strong>${rangeReturn >= 0 ? '+' : ''}${rangeReturn.toFixed(1)}%</strong><span>3M</span></div>
          <div class="readout-item"><strong>${asset.price}</strong><span>Last</span></div>
          <div class="readout-item"><strong>${high.toFixed(1)}</strong><span>High</span></div>
          <div class="readout-item"><strong>${low.toFixed(1)}</strong><span>Low</span></div>
        </div>
        <div class="range-tabs" aria-label="Static range preview">
          <span>1M</span><span class="active">3M</span><span>6M</span><span>1Y</span>
        </div>
      `;
    }

    function renderRows() {
      document.getElementById('row-list').innerHTML = assets.map((asset, index) => `
        <details class="ticker-row" ${index === 0 ? 'open' : ''}>
          <summary class="row-summary">
            <span class="swatch ${asset.swatch}"></span>
            <span class="asset-main">
              <span class="asset-title">${asset.title}</span>
              <span class="asset-ticker">${asset.ticker}</span>
            </span>
            ${miniChart(asset)}
            <span class="asset-metrics">
              <span class="metric-pair"><span class="metric-value flat">${asset.mtd}</span><span class="metric-sep">/</span><span class="metric-value ${asset.daily.startsWith('-') ? 'down' : 'up'}">${asset.daily}</span></span>
              <span class="asset-price">${asset.price}</span>
            </span>
            <span class="expand-mark" aria-hidden="true"></span>
          </summary>
          <div class="chart-drawer">
            ${candleChart(asset)}
            <aside class="drawer-readout">${readout(asset)}</aside>
          </div>
        </details>
      `).join('');
    }

    renderRows();
  </script>
</body>
</html>
