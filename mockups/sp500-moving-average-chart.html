<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S&amp;P 500 Moving Average Chart Mockup</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg: #f4f6fa;
      --panel: #ffffff;
      --ink: #10141c;
      --muted: #667085;
      --line: #d9dee7;
      --blue: #2457ff;
      --ma50: #2563eb;
      --ma200: #d97706;
      --up: #15946f;
      --down: #d64f45;
      --shadow: 0 14px 34px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      min-height: 100vh;
      padding: 18px;
    }

    .chart-shell {
      display: grid;
      grid-template-rows: auto minmax(420px, 1fr);
      overflow: hidden;
      width: min(1180px, 100%);
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .chart-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin-bottom: 5px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #f8fafc;
      padding: 0 10px;
      white-space: nowrap;
    }

    .chart-area {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
    }

    .legend-swatch {
      width: 22px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
    }

    .legend-price { color: var(--ink); }
    .legend-ma50 { color: var(--ma50); }
    .legend-ma200 { color: var(--ma200); }
    .legend-volume { color: #8791a3; }

    #chart {
      min-height: 0;
      height: 100%;
    }

    .loading {
      display: grid;
      place-items: center;
      min-height: 420px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    @media (max-width: 640px) {
      main { padding: 10px; }

      .chart-shell {
        min-height: calc(100vh - 20px);
        border-radius: 7px;
      }

      .chart-header {
        align-items: start;
        flex-direction: column;
        padding: 14px;
      }

      .meta { justify-content: flex-start; }
      .legend { padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="chart-shell" aria-label="S&amp;P 500 moving average chart mockup">
      <header class="chart-header">
        <div>
          <div class="eyebrow">Moving Average Mockup</div>
          <h1>S&amp;P 500</h1>
        </div>
        <div class="meta">
          <span class="pill" id="range-pill">Daily candles</span>
          <span class="pill" id="source-pill">Yahoo Finance sample</span>
        </div>
      </header>

      <div class="chart-area">
        <div class="legend" id="legend" aria-label="Latest chart values">
          <span class="legend-item legend-price"><span class="legend-swatch" aria-hidden="true">&nbsp;</span>Price <strong id="price-value">--</strong></span>
          <span class="legend-item legend-ma50"><span class="legend-swatch" aria-hidden="true">&nbsp;</span>50 MA <strong id="ma50-value">--</strong></span>
          <span class="legend-item legend-ma200"><span class="legend-swatch" aria-hidden="true">&nbsp;</span>200 MA <strong id="ma200-value">--</strong></span>
          <span class="legend-item legend-volume"><span class="legend-swatch" aria-hidden="true">&nbsp;</span>Volume <strong id="volume-value">--</strong></span>
        </div>
        <div id="chart"><div class="loading" id="loading">Loading S&amp;P 500 chart data...</div></div>
      </div>
    </section>
  </main>

  <script>
    const nf = new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 });
    const vf = new Intl.NumberFormat('en-US', { notation: 'compact', maximumFractionDigits: 1 });

    const setText = (id, value) => {
      const node = document.getElementById(id);
      if (node) node.textContent = value;
    };

    function movingAverage(bars, period) {
      const values = [];
      let sum = 0;
      bars.forEach((bar, index) => {
        sum += bar.close;
        if (index >= period) sum -= bars[index - period].close;
        if (index >= period - 1) {
          values.push({ time: bar.time, value: Number((sum / period).toFixed(2)) });
        }
      });
      return values;
    }

    function latestValue(series) {
      return series[series.length - 1]?.value;
    }

    function setVisibleRecentRange(chart, bars, count = 380) {
      const to = bars.length - 1;
      const from = Math.max(0, to - count);
      chart.timeScale().setVisibleLogicalRange({ from, to });
    }

    async function loadData() {
      const response = await fetch('lightweight-chart-data.json', { cache: 'no-store' });
      if (!response.ok) throw new Error('Could not load lightweight-chart-data.json');
      const payload = await response.json();
      const bars = payload?.symbols?.spx?.daily || [];
      if (bars.length < 220) throw new Error('S&P 500 chart sample does not contain enough data for a 200-period average.');
      return { payload, bars };
    }

    async function render() {
      const loading = document.getElementById('loading');
      try {
        const { payload, bars } = await loadData();
        if (!window.LightweightCharts) throw new Error('Lightweight Charts did not load.');

        loading?.remove();
        const chartNode = document.getElementById('chart');
        const chart = LightweightCharts.createChart(chartNode, {
          autoSize: true,
          layout: {
            background: { color: '#ffffff' },
            textColor: '#4b5563',
            fontFamily: 'Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
          },
          grid: {
            vertLines: { color: '#edf1f6' },
            horzLines: { color: '#edf1f6' }
          },
          rightPriceScale: {
            borderColor: '#d9dee7',
            scaleMargins: { top: 0.08, bottom: 0.28 }
          },
          timeScale: {
            borderColor: '#d9dee7',
            timeVisible: false,
            secondsVisible: false
          },
          crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal
          }
        });

        const candles = chart.addCandlestickSeries({
          upColor: '#15946f',
          downColor: '#d64f45',
          borderUpColor: '#15946f',
          borderDownColor: '#d64f45',
          wickUpColor: '#15946f',
          wickDownColor: '#d64f45'
        });

        const volume = chart.addHistogramSeries({
          color: 'rgba(135, 145, 163, 0.32)',
          priceFormat: { type: 'volume' },
          priceScaleId: ''
        });

        chart.priceScale('').applyOptions({
          scaleMargins: { top: 0.78, bottom: 0 }
        });

        const ma50 = chart.addLineSeries({
          color: '#2563eb',
          lineWidth: 2,
          priceLineVisible: false,
          lastValueVisible: false
        });

        const ma200 = chart.addLineSeries({
          color: '#d97706',
          lineWidth: 2,
          priceLineVisible: false,
          lastValueVisible: false
        });

        const volumeBars = bars.map((bar) => ({
          time: bar.time,
          value: bar.volume || 0,
          color: bar.close >= bar.open ? 'rgba(21, 148, 111, 0.26)' : 'rgba(214, 79, 69, 0.26)'
        }));
        const ma50Data = movingAverage(bars, 50);
        const ma200Data = movingAverage(bars, 200);

        candles.setData(bars);
        volume.setData(volumeBars);
        ma50.setData(ma50Data);
        ma200.setData(ma200Data);

        const latest = bars[bars.length - 1];
        setText('price-value', nf.format(latest.close));
        setText('ma50-value', nf.format(latestValue(ma50Data)));
        setText('ma200-value', nf.format(latestValue(ma200Data)));
        setText('volume-value', vf.format(latest.volume || 0));
        setText('source-pill', `${payload?.provider || 'Chart sample'} · ${payload?.generatedAt ? new Date(payload.generatedAt).toLocaleDateString() : 'mockup'}`);
        setVisibleRecentRange(chart, bars);

        chart.subscribeCrosshairMove((param) => {
          const candle = param.seriesData.get(candles) || latest;
          const ma50Point = param.seriesData.get(ma50);
          const ma200Point = param.seriesData.get(ma200);
          const volumePoint = param.seriesData.get(volume);
          setText('price-value', nf.format(candle.close ?? latest.close));
          setText('ma50-value', ma50Point ? nf.format(ma50Point.value) : nf.format(latestValue(ma50Data)));
          setText('ma200-value', ma200Point ? nf.format(ma200Point.value) : nf.format(latestValue(ma200Data)));
          setText('volume-value', volumePoint ? vf.format(volumePoint.value) : vf.format(latest.volume || 0));
        });
      } catch (error) {
        if (loading) loading.textContent = error.message;
      }
    }

    render();
  </script>
</body>
</html>
